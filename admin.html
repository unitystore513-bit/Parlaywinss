<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin CV Taruhan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-4">
    <h1 class="text-2xl font-bold mb-4 text-yellow-500">Panel Kontrol Admin</h1>
    
    <!-- Bagian Transaksi -->
    <div class="bg-slate-900 p-4 rounded-xl mb-6">
        <h2 class="font-bold mb-2">Permintaan Pending</h2>
        <div id="adminList" class="space-y-2 text-sm"></div>
    </div>

    <!-- Admin Panel: Update Metode -->
<div class="bg-slate-900 p-4 rounded-xl mt-4">
    <h2 class="font-bold text-yellow-500 mb-2">Kelola Metode Pembayaran</h2>
    <textarea id="paymentData" class="w-full bg-slate-800 p-2 rounded mb-2 text-sm" placeholder="Contoh: BCA: 1234567890 (a.n Admin)"></textarea>
    <button onclick="savePayment()" class="w-full bg-green-600 py-2 rounded font-bold">Simpan ke Deposit User</button>
</div>

<script type="module">
    // ... (kode firebase sebelumnya)
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    window.savePayment = async () => {
        const text = document.getElementById('paymentData').value;
        await setDoc(doc(db, "settings", "payment"), { info: text });
        alert("Metode pembayaran berhasil disimpan!");
    };
</script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyADI5f9vTDZRTMSpuVuAUzX6GNtXcq4kM8", authDomain: "parlaywins-new.firebaseapp.com", projectId: "parlaywins-new", storageBucket: "parlaywins-new.firebasestorage.app", messagingSenderId: "1025882923334", appId: "1:1025882923334:web:715307a770239023f48547" };
        const db = getFirestore(initializeApp(firebaseConfig));

        // Real-time listener untuk melihat deposit
        onSnapshot(collection(db, "deposits"), (snapshot) => {
            let html = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                if(data.status === "pending") {
                    html += `<div class="flex justify-between bg-slate-800 p-2 rounded">
                        <span>User: ${data.uid} | Rp ${data.amount}</span>
                        <button onclick="approve('${doc.id}', 'deposits')" class="text-green-400">Setujui</button>
                    </div>`;
                }
            });
            document.getElementById('adminList').innerHTML = html;
        });

        window.approve = async (id, col) => {
            await updateDoc(doc(db, col, id), { status: "approved" });
            alert("Berhasil disetujui!");
        };
    </script>
</body>
</html>
