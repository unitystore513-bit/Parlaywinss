<!DOCTYPE HTML>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ParlayWins</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-slate-950 text-white font-sans p-4">

    <div class="max-w-md mx-auto space-y-6">
        <!-- 1. PENGATURAN UMUM -->
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
            <h2 class="text-xl font-bold text-emerald-400 mb-4">⚙️ Pengaturan Umum</h2>
            <div class="space-y-4">
                <div><label class="text-xs text-slate-400">TEXT SELAMAT DATANG</label><input id="adm-welcome" type="text" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 text-sm"></div>
                <div><label class="text-xs text-slate-400">NOMOR WA ADMIN</label><input id="adm-wa" type="text" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 text-sm"></div>
                
                <!-- FITUR: Upload Gambar QRIS Langsung -->
                <div>
                    <label class="text-xs text-slate-400">UPLOAD FOTO QRIS</label>
                    <input id="upload-qris-file" type="file" accept="image/*" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 text-sm text-gray-300">
                    <div id="qris-preview-container" class="mt-2 hidden">
                        <p class="text-[10px] text-slate-500 mb-1">QRIS Aktif Saat Ini:</p>
                        <img id="qris-preview" class="h-20 object-contain border border-slate-700 rounded bg-white p-1">
                    </div>
                </div>
                
                <div><label class="text-xs text-slate-400">BANK LIST</label><textarea id="adm-bank" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 text-sm h-16"></textarea></div>
                <div><label class="text-xs text-slate-400">TEKS PERINGATAN</label><textarea id="adm-warning" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 text-sm h-16"></textarea></div>
                <button onclick="saveConfig()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold text-sm">Simpan Konfigurasi</button>
            </div>
        </div>

        <!-- 2. TAMBAH & KELOLA PERTANDINGAN -->
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
            <h2 class="text-xl font-bold text-blue-400 mb-4">⚽ Tambah Pertandingan</h2>
            <div class="grid grid-cols-2 gap-3">
                <input id="match-home" placeholder="Tim Home" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700">
                <input id="match-away" placeholder="Tim Away" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700">
                <input id="match-logo-home" placeholder="Logo Home URL" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700 col-span-2">
                <input id="match-logo-away" placeholder="Logo Away URL" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700 col-span-2">
                <input id="match-gol" placeholder="Gol (O/U)" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700">
                <input id="match-corner" placeholder="Corner (O/U)" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700">
                <input id="match-win" placeholder="Pemenang" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700 col-span-2">
                <input id="match-btts" placeholder="BTTS (Yes/No)" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700 col-span-2">
            </div>
            <button onclick="addMatch()" class="w-full mt-4 bg-blue-600 py-3 rounded-xl font-bold text-sm">+ Posting Pertandingan</button>

            <div class="mt-6 border-t border-slate-800 pt-4">
                <h3 class="text-sm font-semibold text-slate-400 mb-3">Daftar Pertandingan Aktif</h3>
                <div id="match-list" class="space-y-3"></div>
            </div>
        </div>

        <!-- 3. VALIDASI DEPOSIT -->
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
            <h2 class="text-xl font-bold text-yellow-400 mb-4">💰 Validasi Deposit</h2>
            <div id="deposit-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyADI5f9vTDZRTMSpuVuAUzX6GNtXcq4kM8",
          authDomain: "parlaywins-new.firebaseapp.com",
          projectId: "parlaywins-new",
          storageBucket: "parlaywins-new.firebasestorage.app",
          messagingSenderId: "1025882923334",
          appId: "1:1025882923334:web:9c8912e08f27e8a7f48547"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- CEK EMAIL ---
        firebase.auth().onAuthStateChanged((user) => {
          if (user) {
            Swal.fire('Info Login', 'Anda login sebagai: ' + user.email, 'info');
          } else {
            Swal.fire('Error', 'Anda belum login! Silakan login di index.html', 'error');
          }
        });

        // --- LOAD DATA DARI DATABASE ---
        db.collection('config').doc('global').onSnapshot(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('adm-welcome').value = d.bannerText || '';
                document.getElementById('adm-wa').value = d.wa || '';
                document.getElementById('adm-bank').value = d.bankList || '';
                document.getElementById('adm-warning').value = d.warningText || '';
                
                if (d.qris) {
                    document.getElementById('qris-preview').src = d.qris;
                    document.getElementById('qris-preview-container').classList.remove('hidden');
                }
            }
        });

        // --- SIMPAN KONFIGURASI DENGAN OTOMATIS PROSES UPLOAD FILE QRIS ---
        function saveConfig() {
            const file = document.getElementById('upload-qris-file').files[0];
            const updateData = {
                bannerText: document.getElementById('adm-welcome').value,
                wa: document.getElementById('adm-wa').value,
                bankList: document.getElementById('adm-bank').value,
                warningText: document.getElementById('adm-warning').value
            };

            if (file) {
                Swal.fire({ title: 'Memproses gambar QRIS...', allowOutsideClick: false });
                Swal.showLoading();

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 450; 
                        const scale = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scale;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const base64Img = canvas.toDataURL('image/jpeg', 0.6);
                        updateData.qris = base64Img;
                        
                        sendUpdate(updateData);
                    };
                };
            } else {
                sendUpdate(updateData);
            }
        }

        function sendUpdate(data) {
            db.collection('config').doc('global').set(data, { merge: true }).then(() => {
                Swal.fire({ icon: 'success', title: 'Sukses', text: 'Konfigurasi berhasil disimpan!', timer: 1500 });
                setTimeout(() => { location.reload(); }, 1500);
            }).catch((error) => {
                Swal.fire('Error', 'Gagal menyimpan: ' + error.message, 'error');
            });
        }

        function addMatch() {
            db.collection('matches').add({
                home: document.getElementById('match-home').value,
                away: document.getElementById('match-away').value,
                logoHome: document.getElementById('match-logo-home').value,
                logoAway: document.getElementById('match-logo-away').value,
                gol: document.getElementById('match-gol').value,
                corner: document.getElementById('match-corner').value,
                win: document.getElementById('match-win').value,
                btts: document.getElementById('match-btts').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                Swal.fire('Sukses', 'Pertandingan berhasil ditambahkan', 'success');
                document.getElementById('match-home').value = '';
                document.getElementById('match-away').value = '';
            });
        }

        db.collection('matches').onSnapshot(snap => {
            const list = document.getElementById('match-list');
            list.innerHTML = snap.empty ? '<p class="text-slate-500 text-xs">Tidak ada pertandingan aktif.</p>' : '';
            snap.forEach(doc => {
                const m = doc.data();
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl text-xs border border-slate-700">
                        <span>${m.home || 'Tanpa Nama'} vs ${m.away || 'Tanpa Nama'}</span>
                        <button onclick="deleteMatch('${doc.id}')" class="bg-red-600 px-3 py-1.5 rounded-lg font-bold">Hapus</button>
                    </div>`;
            });
        });

        function deleteMatch(id) {
            db.collection('matches').doc(id).delete();
        }

        // --- HAMPIRAN BARU: VIEW BUKTI TRANSFER & TOMBOL TOLAK/SETUJU DI ADMIN ---
        db.collection('deposits').where('status', '==', 'pending').onSnapshot(snap => {
            const list = document.getElementById('deposit-list');
            list.innerHTML = snap.empty ? '<p class="text-slate-500 text-xs text-center p-4 bg-slate-900 rounded-xl">Tidak ada antrean deposit masuk.</p>' : '';
            snap.forEach(doc => {
                const d = doc.data();
                
                // Cek apakah bukti berupa foto (base64) atau teks biasa (sisa data lama)
                const isImage = d.bukti && d.bukti.startsWith('data:image/');
                const buktiContentHTML = isImage 
                    ? `<div class="mt-2">
                         <p class="text-[10px] text-slate-400 mb-1">BUKTI TRANSFER (Klik Foto untuk Memperbesar):</p>
                         <img src="${d.bukti}" onclick="viewBukti('${d.bukti}')" class="w-full max-h-48 object-cover rounded-xl border border-slate-700 cursor-pointer hover:brightness-110 transition">
                       </div>`
                    : `<p class="text-xs text-slate-400 mt-1">Bukti Transfer (Teks): <b>${d.bukti || '-'}</b></p>`;

                list.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 text-sm space-y-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[10px] text-slate-400">USERNAME PENGGUNA</p>
                                <p class="font-bold text-emerald-400 text-base">${d.username}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-slate-400">PAKET DIPILIH</p>
                                <p class="font-bold text-yellow-400">${d.paket || (d.tickets + ' Tiket')}</p>
                            </div>
                        </div>
                        
                        ${buktiContentHTML}
                        
                        <div class="flex gap-2 pt-2 border-t border-slate-700/50">
                            <button onclick="rejectDeposit('${doc.id}', '${d.username}')" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded-xl text-xs transition">
                                ❌ TOLAK
                            </button>
                            <button onclick="approveDeposit('${doc.id}', '${d.username}', ${d.tickets || 0})" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-xl text-xs transition">
                                ✅ SETUJUI
                            </button>
                        </div>
                    </div>`;
            });
        });

        // Fungsi memperbesar tampilan Bukti Transfer saat diklik
        window.viewBukti = function(imgSrc) {
            Swal.fire({
                imageUrl: imgSrc,
                imageAlt: 'Foto Bukti Transfer',
                background: '#0f172a',
                confirmButtonColor: '#10b981',
                confirmButtonText: 'Tutup',
                customClass: {
                    image: 'max-h-[75vh] object-contain rounded-xl'
                }
            });
        };

        // Fungsi Menolak Deposit
        window.rejectDeposit = function(depositId, username) {
            Swal.fire({
                title: 'Tolak Deposit?',
                text: `Apakah Anda yakin ingin menolak deposit dari ${username}?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#4b5563',
                confirmButtonText: 'Ya, Tolak!',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'Menolak...', allowOutsideClick: false });
                    Swal.showLoading();
                    
                    db.collection('deposits').doc(depositId).update({ 
                        status: 'rejected' 
                    }).then(() => {
                        Swal.fire({ icon: 'error', title: 'Ditolak', text: 'Deposit berhasil ditolak!', timer: 1500 });
                    }).catch(err => Swal.fire({ icon: 'error', text: 'Gagal: ' + err.message }));
                }
            });
        };

        // Fungsi Menyetujui Deposit
        window.approveDeposit = function(depositId, username, ticketAmount) {
            Swal.fire({
                title: 'Konfirmasi Deposit',
                text: 'Setujui ' + ticketAmount + ' tiket untuk ' + username + '?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#4b5563',
                confirmButtonText: 'Setujui',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'Memproses...', allowOutsideClick: false });
                    
                    db.collection('deposits').doc(depositId).update({ status: 'approved' });

                    db.collection('users').doc(username).set({
                        tickets: firebase.firestore.FieldValue.increment(ticketAmount)
                    }, { merge: true }).then(() => {
                        Swal.fire({ icon: 'success', text: 'Tiket berhasil ditambahkan ke akun user!' });
                    }).catch(err => Swal.fire({ icon: 'error', text: 'Gagal: ' + err.message }));
                }
            });
        }
    </script>

    <!-- HTML KELOLA BANNER -->
    <div class="p-4 mx-4 my-6 bg-slate-900 border border-slate-700 rounded-xl text-white">
        <h3 class="text-md font-bold text-green-400 mb-3">⚙️ Kelola Banner Iklan (Slider)</h3>
        <div class="mb-4">
            <label class="block text-xs font-bold text-gray-400 mb-1">UPLOAD FILE GAMBAR IKLAN</label>
            <input type="file" id="upload-slider-file" accept="image/*" class="w-full p-2 bg-slate-800 rounded text-sm text-gray-300">
        </div>
        <button id="btn-upload-slider" class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg text-sm mb-4">
            + Tambahkan Gambar ke Slider
        </button>
        <label class="block text-xs font-bold text-gray-400 mb-2">DAFTAR BANNER AKTIF (Klik Gambar untuk Hapus)</label>
        <div id="admin-banner-list" class="flex flex-wrap gap-2 p-2 bg-slate-800 rounded-lg min-h-[60px]">
        </div>
    </div>

    <script>
        const sliderFileInp = document.getElementById('upload-slider-file');
        const sliderUploadBtn = document.getElementById('btn-upload-slider');
        const adminBannerList = document.getElementById('admin-banner-list');

        db.collection('config').doc('general').onSnapshot(doc => {
            const data = doc.data();
            if (data && data.bannerImages && data.bannerImages.length > 0) {
                adminBannerList.innerHTML = data.bannerImages.map((img, index) => `
                    <div class="relative w-24 h-16 border border-slate-600 rounded overflow-hidden cursor-pointer" onclick="deleteBanner(${index})">
                        <img src="${img}" class="w-full h-full object-cover opacity-75 hover:opacity-100">
                        <div class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-50 text-[10px] text-red-400 font-bold">HAPUS</div>
                    </div>
                `).join('');
            } else {
                adminBannerList.innerHTML = '<p class="text-xs text-gray-500 p-2">Belum ada banner iklan aktif.</p>';
            }
        });

        sliderUploadBtn.addEventListener('click', () => {
            const file = sliderFileInp.files[0];
            if (!file) return Swal.fire('Error', 'Silahkan pilih file gambar terlebih dahulu!', 'error');
            
            Swal.fire({ title: 'Memproses gambar...', allowOutsideClick: false });
            Swal.showLoading();

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const base64Img = canvas.toDataURL('image/jpeg', 0.5);
                    
                    db.collection('config').doc('general').set({
                        bannerImages: firebase.firestore.FieldValue.arrayUnion(base64Img)
                    }, { merge: true }).then(() => {
                        Swal.fire('Sukses', 'Gambar iklan berhasil ditambahkan ke slider!', 'success');
                        sliderFileInp.value = "";
                    }).catch(err => {
                        Swal.fire('Gagal', err.message, 'error');
                    });
                };
            };
        });

        window.deleteBanner = function(index) {
            Swal.fire({
                title: 'Hapus Gambar Ini?',
                text: "Gambar akan dihapus dari slider aplikasi utama.",
                icon: 'warning',
