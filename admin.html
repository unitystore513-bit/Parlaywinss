<!DOCTYPE HTML>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ParlayWins</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-slate-950 text-white font-sans p-4">

    <div class="max-w-md mx-auto space-y-6">
        <!-- 1. PENGATURAN UMUM -->
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
            <h2 class="text-xl font-bold text-emerald-400 mb-4">⚙️ Pengaturan Umum & Sistem</h2>
            <div class="space-y-4">
                <div><label class="text-xs text-slate-400">NOMOR WA ADMIN</label><input id="adm-wa" type="text" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 text-sm"></div>
                <div><label class="text-xs text-slate-400">STATUS PREDIKSI</label><select id="adm-status" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 text-sm"><option value="aktif">Aktif</option><option value="tutup">Tutup</option></select></div>
                <div><label class="text-xs text-slate-400">URL QRIS</label><input id="adm-qris" type="text" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 text-sm"></div>
                <div><label class="text-xs text-slate-400">BANK LIST</label><textarea id="adm-bank" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 text-sm h-20"></textarea></div>
                <div><label class="text-xs text-slate-400">TEKS PERINGATAN</label><textarea id="adm-warning" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 text-sm h-20"></textarea></div>
                <button onclick="saveConfig()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold text-sm">Simpan Konfigurasi Umum</button>
            </div>
        </div>

        <!-- 2. TAMBAH PERTANDINGAN -->
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
            <h2 class="text-xl font-bold text-emerald-400 mb-4">⚽ Tambah Pertandingan Baru</h2>
            <div class="grid grid-cols-2 gap-3">
                <input id="match-home" placeholder="Tim Home" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700">
                <input id="match-away" placeholder="Tim Away" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700">
                <input id="logo-home" placeholder="URL Logo Home" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700 col-span-2">
                <input id="logo-away" placeholder="URL Logo Away" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700 col-span-2">
                <input id="match-gol" placeholder="Gol (O/U)" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700">
                <input id="match-win" placeholder="Pemenang" class="bg-slate-800 p-3 rounded-xl text-xs border border-slate-700">
            </div>
            <button onclick="addMatch()" class="w-full mt-4 bg-blue-600 py-3 rounded-xl font-bold text-sm">+ Posting Pertandingan</button>
            
            <div id="match-list" class="mt-6 space-y-3 border-t border-slate-800 pt-4">
                <!-- Daftar Match akan muncul disini -->
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyADI5f9vTDZRTMSpuVuAUzX6GNtXcq4kM8",
          authDomain: "parlaywins-new.firebaseapp.com",
          projectId: "parlaywins-new",
          storageBucket: "parlaywins-new.firebasestorage.app",
          messagingSenderId: "1025882923334",
          appId: "1:1025882923334:web:9c8912e08f27e8a7f48547"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load Config Awal
        db.collection('config').doc('global').get().then(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('adm-wa').value = d.wa || '';
                document.getElementById('adm-qris').value = d.qris || '';
                document.getElementById('adm-bank').value = d.bankList || '';
                document.getElementById('adm-warning').value = d.warningText || '';
            }
        });

        function saveConfig() {
            db.collection('config').doc('global').set({
                wa: document.getElementById('adm-wa').value,
                qris: document.getElementById('adm-qris').value,
                bankList: document.getElementById('adm-bank').value,
                warningText: document.getElementById('adm-warning').value
            }, {merge: true}).then(() => Swal.fire('Sukses', 'Konfigurasi disimpan', 'success'));
        }

        function addMatch() {
            db.collection('matches').add({
                home: document.getElementById('match-home').value,
                away: document.getElementById('match-away').value,
                logoHome: document.getElementById('logo-home').value,
                logoAway: document.getElementById('logo-away').value,
                gol: document.getElementById('match-gol').value,
                win: document.getElementById('match-win').value
            }).then(() => Swal.fire('Sukses', 'Pertandingan ditambahkan', 'success'));
        }

        // List Matches
        db.collection('matches').onSnapshot(snap => {
            const list = document.getElementById('match-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const m = doc.data();
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl text-xs">
                        <span>${m.home} vs ${m.away}</span>
                        <button onclick="deleteMatch('${doc.id}')" class="bg-red-600 px-3 py-1 rounded-lg">Hapus</button>
                    </div>`;
            });
        });

        function deleteMatch(id) {
            db.collection('matches').doc(id).delete();
        }
    </script>
</body>
</html>
