<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby Taruhan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white p-4 h-screen flex flex-col max-w-md mx-auto">
    <!-- Header Lobby -->
    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl mb-4">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Kode Lobby</p>
                <h1 id="lobbyTitle" class="text-xl font-black text-blue-400 uppercase">...</h1>
            </div>
            <button onclick="callAdmin()" id="callAdminBtn" class="bg-red-600/10 border border-red-600/50 text-red-500 px-4 py-2 rounded-xl text-xs font-bold">Panggil Admin</button>
        </div>
        <div class="mt-4 pt-4 border-t border-slate-800">
            <p class="text-[10px] text-slate-500 uppercase">Jumlah Taruhan</p>
            <h2 id="lobbyAmount" class="text-2xl font-black text-green-400">Rp 0</h2>
        </div>
    </div>

    <!-- Area Chat -->
    <div id="chatBox" class="flex-1 overflow-y-auto bg-slate-900 p-4 rounded-2xl mb-4 border border-slate-800 space-y-3">
        <!-- Pesan akan muncul di sini otomatis -->
    </div>

    <!-- Input Chat -->
    <div class="flex gap-2">
        <input type="text" id="messageInput" placeholder="Ketik pesan..." class="flex-1 bg-slate-900 border border-slate-700 p-4 rounded-2xl focus:outline-none focus:border-blue-500">
        <button onclick="sendMessage()" class="bg-blue-600 px-6 rounded-2xl font-bold"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyADI5f9vTDZRTMSpuVuAUzX6GNtXcq4kM8", authDomain: "parlaywins-new.firebaseapp.com", projectId: "parlaywins-new", storageBucket: "parlaywins-new.firebasestorage.app", messagingSenderId: "1025882923334", appId: "1:1025882923334:web:715307a770239023f48547" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const lobbyId = new URLSearchParams(window.location.search).get('id');
        document.getElementById('lobbyTitle').innerText = lobbyId;

        // Ambil nominal taruhan
        getDoc(doc(db, "lobbies", lobbyId)).then(snap => {
            if(snap.exists()) document.getElementById('lobbyAmount').innerText = "Rp " + snap.data().betAmount.toLocaleString();
        });

        // Real-time Chat
        const q = query(collection(db, `lobbies/${lobbyId}/chats`), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            let html = "";
            snapshot.forEach(d => {
                const data = d.data();
                const isMine = data.senderEmail === (auth.currentUser ? auth.currentUser.email : "");
                const isAdmin = data.senderEmail === "admin@cvtaruhan.com";
                
                html += `
                <div class="flex ${isAdmin ? 'justify-start' : (isMine ? 'justify-end' : 'justify-start')}">
                    <div class="px-4 py-2 rounded-2xl text-sm ${isAdmin ? 'bg-yellow-600/20 text-yellow-100 border border-yellow-600' : (isMine ? 'bg-blue-600' : 'bg-slate-800')}">
                        <p class="text-[9px] opacity-70 mb-1">${data.senderEmail.split('@')[0]}</p>
                        ${data.text}
                    </div>
                </div>`;
            });
            const box = document.getElementById('chatBox');
            box.innerHTML = html;
            box.scrollTop = box.scrollHeight;
        });

        window.sendMessage = async () => {
            const input = document.getElementById('messageInput');
            if(!input.value) return;
            await addDoc(collection(db, `lobbies/${lobbyId}/chats`), {
                text: input.value,
                senderEmail: auth.currentUser.email,
                timestamp: new Date()
            });
            input.value = "";
        };

        window.callAdmin = async () => {
            await addDoc(collection(db, `lobbies/${lobbyId}/chats`), {
                text: "⚠️ Panggilan kepada Admin telah dikirim.",
                senderEmail: "Sistem",
                timestamp: new Date()
            });
            alert("Admin telah dipanggil!");
        };
    </script>
</body>
</html>
