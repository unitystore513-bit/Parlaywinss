<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby Taruhan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white p-4 h-screen flex flex-col max-w-md mx-auto">
    <!-- Header Lobby -->
    <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 mb-4 flex justify-between items-center">
        <div>
            <p class="text-xs text-slate-400">Kode Lobby:</p>
            <h1 id="lobbyTitle" class="text-xl font-black text-blue-400 uppercase">Memuat...</h1>
            <!-- Element Baru untuk Menampilkan Nominal Taruhan -->
            <p id="betDisplay" class="text-xs text-yellow-400 font-bold mt-1">Taruhan: Rp 0</p>
        </div>
        <div class="flex gap-2">
            <button onclick="callAdmin()" id="callAdminBtn" class="bg-red-600/20 text-red-500 border border-red-600 px-3 py-2 rounded-lg text-xs font-bold transition">Panggil Admin</button>
            <button onclick="window.location.href='index.html'" class="bg-slate-800 px-3 py-2 rounded-lg text-xs"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>
    <!-- Area Perbandingan ID & Taruhan -->
    <div class="flex justify-between items-center bg-slate-800 p-4 rounded-xl mb-4">
        <div id="p1" class="text-center font-bold text-sm">User 1</div>
        <div class="text-slate-500 font-black">VS</div>
        <div id="p2" class="text-center font-bold text-sm">User 2</div>
    </div>
    <div class="flex justify-between text-xs text-blue-400 mb-4 px-2">
        <span id="bet1">Taruhan: Rp 0</span>
        <span id="bet2">Taruhan: Rp 0</span>
    </div>
    <div id="actionContainer">
    <button onclick="masukTaruhan()" class="bg-green-600 text-white p-2 rounded-lg w-full mt-4 font-bold text-sm hover:bg-green-500">
        MASUK TARUHAN
    </button>
    </div>
    <!-- Area Chat -->
    <div id="chatBox" class="flex-1 overflow-y-auto bg-slate-900 p-4 rounded-xl mb-4 border border-slate-800 space-y-3">
        <p class="text-center text-xs text-slate-500 my-4">Selamat datang di lobby taruhan.</p>
        <!-- Pesan muncul di sini -->
    </div>

    <!-- Input Chat -->
    <div class="flex gap-2 mb-4">
        <input type="text" id="messageInput" placeholder="Ketik pesan..." class="flex-1 bg-slate-900 border border-slate-700 p-3 rounded-xl focus:outline-none focus:border-blue-500">
        <button onclick="sendMessage()" class="bg-blue-600 px-5 rounded-xl font-bold"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script type="module">
        function hitungPotongan(totalTaruhan) {
    if (totalTaruhan <= 50000) return 5000;
    if (totalTaruhan <= 100000) return 10000;
    if (totalTaruhan <= 300000) return 30000;
    if (totalTaruhan <= 800000) return 50000;
    if (totalTaruhan <= 1500000) return 80000;
    if (totalTaruhan <= 2500000) return 100000;
    if (totalTaruhan <= 5000000) return 200000;
    return 0;
        }
        window.masukTaruhan = async () => {
    const nominal = parseInt(prompt("Masukkan nominal taruhan Anda:"));
    if (!nominal || nominal <= 0) return;
    
    const userRef = doc(db, "users", auth.currentUser.uid);
    const userSnap = await getDoc(userRef);
    
    // Mengambil saldo saat ini
    const currentBalance = userSnap.data().balance || 0;
    
    if (currentBalance < nominal) return alert("Saldo tidak cukup!");

    try {
        // 1. Potong saldo user secara manual tanpa increment
        const sisaSaldo = currentBalance - nominal;
        await updateDoc(userRef, { balance: sisaSaldo });
        
        // 2. Simpan nama (username) dan nominal taruhan ke dalam lobby
        const username = auth.currentUser.email.split('@')[0];
        await updateDoc(doc(db, "lobbies", lobbyId), {
            [`players.${auth.currentUser.uid}`]: {
                username: username,
                bet: nominal
            }
        });
        
        alert("Taruhan berhasil dimasukkan!");
    } catch (e) {
        console.error(e);
        alert("Terjadi kesalahan saat memasukkan taruhan.");
    }
};
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        // Menambahkan getDoc ke dalam import
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyADI5f9vTDZRTMSpuVuAUzX6GNtXcq4kM8", authDomain: "parlaywins-new.firebaseapp.com", projectId: "parlaywins-new", storageBucket: "parlaywins-new.firebasestorage.app", messagingSenderId: "1025882923334", appId: "1:1025882923334:web:715307a770239023f48547" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Ambil ID Lobby dari URL (contoh: lobby.html?id=XYZ123)
        const urlParams = new URLSearchParams(window.location.search);
        const lobbyId = urlParams.get('id');

        if (!lobbyId) {
            alert("Akses ditolak. Kode lobby tidak valid.");
            window.location.href = "index.html";
        } else {
            document.getElementById('lobbyTitle').innerText = lobbyId;
            
            // LOGIKA BARU: Mengambil data nominal taruhan (betAmount) dari database
            getDoc(doc(db, "lobbies", lobbyId)).then(snap => {
                if(snap.exists() && snap.data().betAmount) {
                    document.getElementById('betDisplay').innerText = "Taruhan: Rp " + snap.data().betAmount.toLocaleString('id-ID');
                }
            });
        }

        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = "index.html"; // Harus login
        });

        // Fitur Panggil Admin
window.callAdmin = async () => {
    if (!lobbyId) return alert("Kode lobby tidak ditemukan!");
    
    try {
        // Mengirim sinyal panggilan admin ke database Firebase
        await updateDoc(doc(db, "lobbies", lobbyId), {
            adminCalled: true,
            status: "admin_called"
        });

        // Mengubah tampilan tombol di layar user
        const btn = document.getElementById('callAdminBtn');
        if (btn) {
            btn.innerHTML = "Admin Dipanggil!";
            btn.classList.remove('bg-red-600/20', 'text-red-500');
            btn.classList.add('bg-red-600', 'text-white');
        }

        alert("Panggilan kepada Admin telah berhasil dikirim ke sistem!");
    } catch (e) {
        console.error("Error panggil admin:", e);
        alert("Gagal memanggil admin, coba lagi.");
    }
};
        // --- FUNGSI TUTUP LOBBY ---
window.tutupLobby = async () => {
    if(confirm("Yakin ingin menutup dan menghapus lobby ini?")) {
        await deleteDoc(doc(db, "lobbies", lobbyId));
        window.location.href = "index.html";
    }
};

        // Kirim Pesan
        window.sendMessage = async () => {
            const input = document.getElementById('messageInput');
            if (!input.value.trim()) return;
            
            let sender = auth.currentUser.email === "admin@cvtaruhan.com" ? "ADMIN" : auth.currentUser.email.split('@')[0];

            await addDoc(collection(db, `lobbies/${lobbyId}/chats`), {
                text: input.value, senderEmail: sender, timestamp: new Date()
            });
            input.value = "";
            
            // Jika admin yang balas, matikan status 'needsAdmin'
            if (auth.currentUser.email === "admin@cvtaruhan.com") {
                await updateDoc(doc(db, "lobbies", lobbyId), { needsAdmin: false });
            }
        };

        // Tampilkan Chat Real-time
        const q = query(collection(db, `lobbies/${lobbyId}/chats`), orderBy("timestamp"));
        onSnapshot(q, (snapshot) => {
            let html = "";
            snapshot.forEach(docData => { 
                const data = docData.data();
                const isAdmin = data.senderEmail === "ADMIN";
                const isSystem = data.senderEmail === "Sistem";
                
                let bubbleClass = isAdmin ? "bg-yellow-600/20 border border-yellow-600 text-yellow-100" : 
                                 isSystem ? "bg-slate-800 text-slate-400 text-center italic text-[10px] w-full border-none p-1" :
                                 "bg-blue-600 text-white";

                html += `<div class="mb-2 p-2 rounded-lg text-sm w-fit max-w-[85%] ${bubbleClass}">
                    ${isSystem ? '' : `<p class="text-[10px] font-bold mb-1 ${isAdmin ? 'text-yellow-500' : 'text-slate-300'}">${data.senderEmail}</p>`}
                    ${data.text}
                </div>`; 
            });
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = html;
            chatBox.scrollTop = chatBox.scrollHeight; // Auto scroll ke bawah
        });
        // --- UPDATE TAMPILAN LOBBY, TOTAL TARUHAN, & STATUS MENANG/KALAH ---
onSnapshot(doc(db, "lobbies", lobbyId), (docSnap) => {
    if (docSnap.exists()) {
        const data = docSnap.data();
        let bet1 = 0, bet2 = 0;
        
        if (data.players) {
            const uids = Object.keys(data.players);
            
            if (uids.length > 0) {
                document.getElementById('p1').innerText = data.players[uids[0]].username;
                document.getElementById('bet1').innerText = "Taruhan: Rp " + data.players[uids[0]].bet.toLocaleString();
                bet1 = data.players[uids[0]].bet;
            }
            if (uids.length > 1) {
                document.getElementById('p2').innerText = data.players[uids[1]].username;
                document.getElementById('bet2').innerText = "Taruhan: Rp " + data.players[uids[1]].bet.toLocaleString();
                bet2 = data.players[uids[1]].bet;
            }
        }

        // OTOMATIS JUMLAHKAN TARUHAN DI HEADER
        const totalTaruhan = bet1 + bet2;
        document.getElementById('betDisplay').innerText = "Taruhan: Rp " + totalTaruhan.toLocaleString();

        // MENGATUR TAMPILAN JIKA ADMIN SUDAH MENENTUKAN PEMENANG
        const actionContainer = document.getElementById('actionContainer');
        const myUid = auth.currentUser ? auth.currentUser.uid : null;

        if (actionContainer && myUid && data.winner) {
            if (data.winner === myUid) {
                // JIKA SAYA MENANG
                if (data.claimed) {
                    actionContainer.innerHTML = `<div class="bg-blue-600 text-white p-3 rounded-lg w-full mt-4 font-bold text-sm text-center">Kemenangan Sudah Diambil</div>`;
                } else {
                    actionContainer.innerHTML = `<button onclick="ambilKemenangan(${totalTaruhan})" class="bg-yellow-500 text-black p-3 rounded-lg w-full mt-4 font-black text-sm animate-pulse shadow-[0_0_15px_rgba(234,179,8,0.5)]">AMBIL KEMENANGAN (Rp ${totalTaruhan.toLocaleString()})</button>`;
                }
            } else {
                // JIKA SAYA KALAH
                actionContainer.innerHTML = `<div class="bg-red-600 text-slate-300 border border-red-500 p-3 rounded-lg w-full mt-4 font-bold text-sm text-center italic">Taruhan Anda Kalah</div>`;
            }
        }
    }
});

// --- FUNGSI KLIK AMBIL KEMENANGAN ---
window.ambilKemenangan = async (totalTaruhan) => {
    // Menghitung potongan (memanggil fungsi yang sudah Anda buat sebelumnya)
    const potongan = hitungPotongan(totalTaruhan); 
    const bersih = totalTaruhan - potongan;
    
    try {
        const userRef = doc(db, "users", auth.currentUser.uid);
        const userSnap = await getDoc(userRef);
        const currentBalance = userSnap.data().balance || 0;
        
        // 1. Tambahkan saldo kemenangan yang sudah dipotong bersih
        await updateDoc(userRef, { balance: currentBalance + bersih });
        
        // 2. Beri stempel di database bahwa sudah diambil agar tidak bisa digandakan
        await updateDoc(doc(db, "lobbies", lobbyId), { claimed: true });
        
        alert(`Selamat! Anda mendapatkan Rp ${bersih.toLocaleString()}\n(Dipotong Admin: Rp ${potongan.toLocaleString()})`);
    } catch (e) {
        console.error(e);
        alert("Terjadi kesalahan saat mengambil kemenangan.");
    }
};
    </script>
</body>
</html>
