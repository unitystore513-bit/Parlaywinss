<!DOCTYPE HTML>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParlayWins - Portal Utama</title>
    
    <!-- CSS Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Library Pop-up Modern SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.85); z-index: 50; align-items: center; justify-content: center; padding: 1rem; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans">

    <!-- ================= PANEL LOGIN & DAFTAR (AUTH) ================= -->
    <div id="auth-screen" class="max-w-md mx-auto min-h-screen flex flex-col justify-center items-center px-6 bg-slate-900 border-x border-slate-800">
        <div class="w-full space-y-6 bg-slate-950 p-6 rounded-3xl border border-slate-800 shadow-xl">
            <div class="text-center space-y-2">
                <span class="text-4xl">⚽</span>
                <h2 id="auth-title" class="text-2xl font-black text-emerald-400 italic tracking-wider text-center">MASUK AKUN</h2>
                <p id="auth-subtitle" class="text-xs text-slate-400 text-center">Silakan masuk menggunakan username Anda</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1">USERNAME</label>
                    <input id="auth-username" type="text" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-emerald-500 text-white" placeholder="Masukkan username">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1">PASSWORD</label>
                    <input id="auth-password" type="password" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-emerald-500 text-white" placeholder="Masukkan password">
                </div>
            </div>

            <div class="space-y-3 pt-2">
                <button id="btn-primary-auth" onclick="handleAuth()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl font-bold text-sm shadow-lg shadow-emerald-600/20 transition text-white">
                    Masuk Sekarang!
                </button>
                <button id="btn-toggle-auth" onclick="toggleAuthMode()" class="w-full bg-transparent text-xs text-slate-400 hover:text-white py-1 transition text-center block">
                    Belum punya akun? Daftar di sini
                </button>
            </div>
        </div>
    </div>


    <!-- ================= UTAMA APLIKASI WEB USER ================= -->
    <div id="main-app" class="max-w-md mx-auto min-h-screen bg-slate-900 shadow-2xl relative pb-24 border-x border-slate-800 hidden">
        
        <!-- TOP BAR NAVIGASI -->
        <div class="p-4 flex justify-between items-center bg-slate-900/80 backdrop-blur sticky top-0 z-30 border-b border-slate-800">
            <div>
                <button onclick="handleLogout()" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-1.5 rounded-xl font-medium transition text-white">
                    🚪 Keluar
                </button>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-amber-500/10 border border-amber-500/30 px-3 py-1.5 rounded-xl flex items-center gap-1.5">
                    <span class="text-xs text-amber-400 font-medium">Tiket:</span>
                    <span id="ticket-balance" class="text-sm font-black text-amber-300">0</span>
                    <span class="text-xs">🎟️</span>
                </div>
                <button onclick="toggleModal('modal-deposit', true)" class="bg-emerald-600 hover:bg-emerald-700 text-xs font-bold px-4 py-2 rounded-xl transition uppercase tracking-wide text-white">
                    DEPOSIT
                </button>
            </div>
        </div>

        <!-- INFO USER LOGGED IN -->
        <div class="px-6 pt-4">
            <p class="text-xs text-slate-400">Selamat datang kembali, <span id="user-display-name" class="text-emerald-400 font-bold">User</span>!</p>
        </div>

        <!-- LOGO BRAND -->
        <div class="p-4 flex items-center justify-center gap-2">
            <span class="text-2xl">⚽</span>
            <h1 class="text-2xl font-black tracking-wider text-emerald-400 italic">PARLAYWINS</h1>
        </div>

        <!-- TEXT BANNER UTAMA -->
        <div class="mx-4 p-4 bg-slate-800/60 border border-slate-700 rounded-2xl text-center">
            <p id="view-banner-title" class="text-sm font-semibold text-slate-200">Selamat datang di parlaywins</p>
        </div>

        <!-- DAFTAR PERTANDINGAN DINAMIS -->
        <div class="mt-6 px-4 space-y-4">
            <h3 class="text-xs font-bold tracking-widest text-slate-400 uppercase">PERTANDINGAN HARI INI</h3>
            <div id="match-container" class="space-y-4"></div>
        </div>

        <!-- RUANG TEKS PERINGATAN -->
        <div class="mx-4 mt-6 p-4 bg-amber-500/5 border border-amber-500/20 rounded-2xl">
            <h4 class="text-[11px] font-bold text-amber-500 uppercase tracking-wider mb-1">⚠️ INFO & TEKS PERINGATAN ADMIN</h4>
            <p id="view-warning-text" class="text-xs text-amber-200/80 leading-relaxed">Memuat teks...</p>
        </div>

        <!-- FLOATING WA BUTTON -->
<a id="wa-link" href="https://wa.me/6281213847109" target="_blank" class="fixed bottom-6 right-6 bg-emerald-500 p-4 rounded-full shadow-lg z-50">
    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
        <path d="M..."></path> <!-- Biarkan isi SVG tetap sama -->
    </svg>
</a>

    



    <!-- ================= IMPORT FIREBASE SECARA INSTAN & STABIL ================= -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
// --- CONFIG & DB ---
const firebaseConfig = {
    apiKey: "AizaSyADISf9vTDZRTWSpVuAUzX6GNtXcqdKM8",
    authDomain: "parlaywins-new.firebaseapp.com",
    projectId: "parlaywins-new",
    storageBucket: "parlaywins-new.appspot.com",
    messagingSenderId: "1025882923334",
    appId: "1:1025882923334:web:9c8912e08f27e8a7f48547"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let isLoginMode = true;
let currentUser = sessionStorage.getItem('currentUser') || null;

// --- FUNGSI LOGIN ---
window.handleAuth = function() {
    const user = document.getElementById('auth-username').value.trim();
    const pass = document.getElementById('auth-password').value.trim();

    if (!user || !pass) {
        Swal.fire({ icon: 'warning', text: 'Username dan Password wajib diisi!' });
        return;
    }

    // Menggunakan Firebase Auth
    // Kita anggap username adalah email (contoh: user@parlay.com)
    firebase.auth().signInWithEmailAndPassword(user + "@parlay.com", pass)
    .then((userCredential) => {
        Swal.fire({ icon: 'success', text: 'Login Berhasil!' });
        location.reload(); // Refresh halaman setelah login
    })
    .catch((error) => {
        Swal.fire({ icon: 'error', text: 'Login Gagal: ' + error.message });
    });
};

window.toggleAuthMode = function() {
    isLoginMode = !isLoginMode;
    document.getElementById('auth-title').innerText = isLoginMode ? 'MASUK AKUN' : 'DAFTAR AKUN';
    document.getElementById('btn-primary-auth').innerText = isLoginMode ? 'Masuk Sekarang' : 'Daftar Sekarang';
};

// --- FUNGSI TAMPILAN & LOGIKA ---
function checkAuthSession() {
    if (currentUser) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-display-name').innerText = currentUser;
        listenToUserData();
        listenToConfiguration();
        listenToMatches();
    }
}

function listenToUserData() {
    db.collection('users').doc(currentUser).onSnapshot((doc) => {
        if (doc.exists) document.getElementById('ticket-balance').innerText = doc.data().tickets || '0';
    });
}

function listenToConfiguration() {
    db.collection('config').doc('global').onSnapshot((doc) => {
        if (doc.exists) {
            const data = doc.data();
            
            // Menampilkan daftar bank
            const bankDisplay = document.getElementById('display-bank-list');
            if (bankDisplay) {
                bankDisplay.innerText = data.bankList || "Rekening belum diatur admin.";
            }

            // Menampilkan teks peringatan
            if(document.getElementById('view-warning-text')) {
                document.getElementById('view-warning-text').innerText = data.warningText || 'Info admin...';
            }
        }
    });
}
function listenToMatches() {
    const container = document.getElementById('match-container');
    db.collection('matches').onSnapshot((snapshot) => {
        container.innerHTML = '';
        snapshot.forEach((doc) => {
            const m = doc.data();
            container.innerHTML += `
            <div class="bg-slate-800/60 border border-slate-700 rounded-2xl p-5 shadow-lg space-y-4 mb-4">
                <div class="flex justify-between items-center text-center">
                    <div class="w-1/3 flex flex-col items-center gap-2">
                        <img src="${m.logoHome}" class="w-12 h-12 object-contain">
                        <span class="text-xs font-bold text-slate-200">${m.home}</span>
                    </div>
                    <div class="w-1/3 font-black text-emerald-400 text-sm tracking-widest">VS</div>
                    <div class="w-1/3 flex flex-col items-center gap-2">
                        <img src="${m.logoAway}" class="w-12 h-12 object-contain">
                        <span class="text-xs font-bold text-slate-200">${m.away}</span>
                    </div>
                </div>
                <button onclick="unlockVipPrediction('${doc.id}')" class="w-full bg-gradient-to-r from-yellow-500 to-amber-600 p-3 rounded-xl font-bold text-black">
                    💰 BUKA PREDIKSI VIP (1 Tiket)
                </button>
            </div>`;
        });
    });
}

window.unlockVipPrediction = function(matchId) {
    db.collection('users').doc(currentUser).get().then((doc) => {
        if ((doc.data().tickets || 0) < 1) {
            Swal.fire({ icon: 'warning', text: 'Tiket Anda Habis!' });
            return;
        }
        db.collection('matches').doc(matchId).get().then((m) => {
            const data = m.data();
            db.collection('users').doc(currentUser).update({ tickets: firebase.firestore.FieldValue.increment(-1) });
            Swal.fire({
                title: 'PREDIKSI VIP',
                background: '#1e293b',
                color: '#fff',
                html: `<div class="text-left text-sm space-y-2 mt-4">
                        <p class="text-center font-bold text-lg mb-2">${data.home} vs ${data.away}</p>
                        <p>⚽ Gol: <b class="text-emerald-400">${data.gol}</b></p>
                        <p>⛳Corner: <b class="text-emerald-400">${data.corner}</b></p>
                        <p>🚀BTTS: <b class="text-emerald-400">${data.btts}</b></p>
                        <p>🏆 Win: <b class="text-emerald-400">${data.win}</b></p>
                       </div>`
            });
        });
    });
};

window.handleLogout = function() { sessionStorage.removeItem('currentUser'); location.reload(); };
document.addEventListener('DOMContentLoaded', checkAuthSession);
        window.toggleModal = function(id, show) {
    document.getElementById(id).style.display = show ? 'flex' : 'none';
};

window.submitDepositForm = function() {
    const user = document.getElementById('dep-username').value.trim();
    const paketText = document.getElementById('dep-paket').value; // Contoh: "Rp 20.000 (Dapat 2 Tiket)"
    const bukti = document.getElementById('dep-bukti').value.trim();
    
    // Logika otomatis: Ambil angka tiket dari teks paket
    let ticketCount = 0;
    if (paketText.includes('2 Tiket')) ticketCount = 2;
    else if (paketText.includes('4 Tiket')) ticketCount = 4;
    // Tambahkan else if di sini jika ada paket lain

    if (!user || !bukti) {
        Swal.fire({ icon: 'warning', text: 'Harap isi username dan bukti!' });
        return;
    }

    Swal.fire({ title: 'Mengirim...', allowOutsideClick: false });
    db.collection('deposits').add({
        username: user,
        paket: paketText,
        tickets: ticketCount, // <--- INI KUNCI: Kita simpan angka tiketnya
        bukti: bukti,
        status: 'pending',
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        Swal.fire({ icon: 'success', text: 'Deposit berhasil dikirim!' });
        document.getElementById('modal-deposit').style.display = 'none';
    }).catch(err => Swal.fire({ icon: 'error', text: 'Gagal: ' + err.message }));
};
        window.saveConfig = function() {
    const wa = document.getElementById('admin-wa').value;
    const banner = document.getElementById('admin-banner').value;
    const warning = document.getElementById('admin-warning').value;

    db.collection('config').doc('global').update({
        wa: wa,
        bannerText: banner,
        warningText: warning
    }).then(() => {
        Swal.fire({ icon: 'success', text: 'Konfigurasi berhasil disimpan!', timer: 2000 });
        setTimeout(() => { location.reload(); }, 2000); 
    }).catch((err) => {
        Swal.fire({ icon: 'error', text: 'Gagal simpan: ' + err.message });
    });
};
        
    </script>
    <!-- MODAL DEPOSIT - PASTIKAN KODE INI ADA DI PALING BAWAH FILE -->
<div id="modal-deposit" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:999999; align-items:center; justify-content:center; padding:20px;">
    <div style="background:#1e293b; padding:25px; border-radius:16px; width:100%; max-width:400px; border:1px solid #334155; color:white;">
        <h2 style="font-weight:bold; margin-bottom:20px; text-align:center; font-size:18px;">💳 TOP UP TIKET VIP</h2>
        
        <!-- BAGIAN REKENING -->
        <div style="background:#0f172a; padding:15px; border-radius:8px; margin-bottom:15px; border:1px solid #475569;">
            <p style="font-size:12px; color:#94a3b8; margin-bottom:5px;">METODE PEMBAYARAN:</p>
            <div id="display-bank-list" style="font-size:14px; white-space:pre-wrap;">Memuat rekening...</div>
        </div>
        
        <label style="display:block; font-size:12px; color:#94a3b8; margin-bottom:5px;">USERNAME AKUN ANDA</label>
        <input id="dep-username" type="text" placeholder="Masukkan Username..." style="width:100%; padding:15px; margin-bottom:15px; background:#0f172a; border:1px solid #475569; border-radius:8px; color:white; outline:none; font-size:16px;">
        
        <label style="display:block; font-size:12px; color:#94a3b8; margin-bottom:5px;">PILIH PAKET</label>
        <select id="dep-paket" style="width:100%; padding:15px; margin-bottom:15px; background:#0f172a; border:1px solid #475569; border-radius:8px; color:white; font-size:16px;">
            <option value="Rp 20.000 (Dapat 2 Tiket)">Rp 20.000 (Dapat 2 Tiket)</option>
            <option value="Rp 45.000 (Dapat 4 Tiket)">Rp 45.000 (Dapat 4 Tiket)</option>
        </select>

        <label style="display:block; font-size:12px; color:#94a3b8; margin-bottom:5px;">BUKTI TRANSFER</label>
        <textarea id="dep-bukti" placeholder="Contoh: Transfer Mandiri An. Budi" style="width:100%; padding:15px; margin-bottom:20px; background:#0f172a; border:1px solid #475569; border-radius:8px; color:white; font-size:16px; height:80px;"></textarea>
        
        <div style="display:flex; gap:10px;">
            <button onclick="document.getElementById('modal-deposit').style.display='none'" style="flex:1; padding:15px; background:#475569; border:none; border-radius:8px; font-weight:bold; color:white;">Tutup</button>
            <button onclick="submitDepositForm()" style="flex:1; padding:15px; background:#059669; border:none; border-radius:8px; font-weight:bold; color:white;">Kirim Bukti</button>
        </div>
    </div>
</div>
</body>
</html>
