<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVTARUHAN - Platform Taruhan Game & Olahraga Terunggul</title>
    <meta name="description" content="CVTARUHAN adalah web taruhan untuk isian CS FF, isian bola, dan lainnya. Fitur lengkap dengan lobby kode unik, live chat, serta deposit & withdraw aman 100%.">
    <meta name="keywords" content="taruhan cs ff, isian bola, cvtaruhan, lobby taruhan, taruhan online aman">
    
    <!-- Pemuat Desain Aplikasi -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <!-- NAVBAR AREA -->
    <nav class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center">
        <h1 class="text-xl font-black italic uppercase text-white">CV<span class="text-blue-500">TARUHAN</span></h1>
        <div id="userMenu" class="hidden flex gap-4">
            <div id="userDisplay" class="text-xs text-slate-500 font-mono italic"></div>
            <button onclick="window.logout()" class="text-slate-400 hover:text-white transition">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4">

        <!-- AREA LOGIN & DAFTAR -->
        <div id="authView" class="mt-10">
            <!-- Form Login -->
            <div id="loginForm">
                <h2 class="text-2xl font-bold mb-6">Masuk</h2>
                <input type="text" id="email" placeholder="Username/Email" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg mb-4 focus:outline-none focus:border-blue-500">
                <input type="password" id="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg mb-4 focus:outline-none focus:border-blue-500">
                <button onclick="window.login()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Masuk</button>
                <p class="text-center mt-4 text-sm">Belum punya akun? <button onclick="window.toggleForm('register')" class="text-blue-400 font-bold">Daftar</button></p>
            </div>
            
            <!-- Form Daftar -->
            <div id="registerForm" class="hidden">
                <h2 class="text-2xl font-bold mb-6">Daftar Akun</h2>
                <input type="text" id="regEmail" placeholder="Username/Email" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg mb-2 focus:outline-none focus:border-blue-500">
                <input type="text" id="regPhone" placeholder="Nomor Telepon" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg mb-2 focus:outline-none focus:border-blue-500">
                <input type="password" id="regPassword" placeholder="Password" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg mb-2 focus:outline-none focus:border-blue-500">
                <input type="password" id="regConfirm" placeholder="Konfirmasi Password" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg mb-4 focus:outline-none focus:border-blue-500">
                <button onclick="window.register()" class="w-full bg-green-600 py-3 rounded-lg font-bold">Daftar Akun</button>
                <p class="text-center mt-4 text-sm">Sudah punya akun? <button onclick="window.toggleForm('login')" class="text-blue-400 font-bold">Masuk</button></p>
            </div>
        </div>

        <!-- DASHBOARD VIEW -->
        <div id="dashboardView" class="hidden space-y-4">
            
            <!-- BOX SALDO -->
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <p id="balanceTitle" class="text-slate-400 text-xs">Saldo Anda</p>
                <h3 id="displayBalance" class="text-3xl font-black mt-1 mb-5">Rp 0</h3>
                <div id="financeButtons" class="grid grid-cols-2 gap-3">
                    <button onclick="window.bukaModalDeposit()" class="bg-slate-800 border border-blue-600 text-blue-400 py-2.5 rounded">Deposit</button>
                    <button onclick="window.bukaWithdraw()" class="bg-slate-800 border border-red-600 text-red-500 py-2.5 rounded">Withdraw</button>
                </div>
            </div>

            <!-- MENU USER -->
            <div id="userActions" class="space-y-4">
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <button onclick="window.createLobby()" class="w-full bg-green-600 py-3 rounded-xl font-bold mb-3">Buat Lobby Taruhan Baru</button>
                    <div class="flex gap-2">
                        <input type="text" id="joinCode" placeholder="Kode Lobby" class="w-2/3 bg-slate-950 border border-slate-700 p-3 rounded-xl focus:outline-none focus:border-blue-500 uppercase text-center font-bold">
                        <button onclick="window.joinLobby()" class="w-1/3 bg-blue-600 py-3 rounded-xl font-bold">Masuk</button>
                    </div>
                </div>
            </div>

            <!-- RIWAYAT LOBBY -->
            <div id="lobbyHistorySection" class="hidden bg-slate-900 p-4 rounded-xl border border-slate-800">
                <h2 class="font-bold text-slate-300 text-sm mb-3">Riwayat Lobby Anda</h2>
                <div id="historyList" class="space-y-2"></div>
            </div>

            <!-- ADMIN PANEL -->
            <div id="adminPanel" class="hidden space-y-4">
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <h2 class="font-bold text-yellow-500 text-sm mb-3">Lobby Aktif & Panggilan</h2>
                    <div id="adminLobbyList" class="space-y-2"></div>
                </div>
                
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <h2 class="font-bold text-yellow-500 text-sm mb-3">Permintaan Transaksi Pending</h2>
                    <div id="adminList" class="space-y-2"></div>
                </div>
                
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <h2 class="font-bold text-yellow-500 text-sm mb-3">Kelola Metode Pembayaran</h2>
                    <input type="text" id="payBank" placeholder="Nama Bank/E-Wallet (Misal: BCA, DANA)" class="w-full bg-slate-950 border border-slate-700 p-3 rounded-lg mb-2 text-sm focus:outline-none focus:border-blue-500">
                    <input type="text" id="payRek" placeholder="Nomor Rekening / No HP" class="w-full bg-slate-950 border border-slate-700 p-3 rounded-lg mb-2 text-sm focus:outline-none focus:border-blue-500">
                    <input type="text" id="payLogo" placeholder="URL Logo (Link gambar - Opsional)" class="w-full bg-slate-950 border border-slate-700 p-3 rounded-lg mb-3 text-sm focus:outline-none focus:border-blue-500">
                    
                    <button onclick="window.savePayment()" class="w-full bg-green-600 py-3 rounded-xl font-bold text-sm mb-2">Tambah Metode Pembayaran</button>
                    
                    <div id="paymentListAdmin" class="space-y-2 mt-4 border-t border-slate-800 pt-3">
                        <!-- List pembayaran admin akan dirender di sini -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL DEPOSIT -->
    <div id="depositModal" class="hidden fixed inset-0 bg-slate-900/90 flex justify-center items-center z-50 p-4">
        <div class="bg-slate-200 w-full max-w-md rounded-xl shadow-2xl overflow-hidden">
            <div class="bg-slate-800 p-4 flex justify-between items-center text-white">
                <h2 class="font-bold">Deposit Akun</h2>
                <button onclick="window.tutupModalDeposit()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-4 grid grid-cols-2 gap-3" id="depositMethodsGrid">
                <!-- Metode deposit dari Firestore akan muncul di sini -->
                <p class="text-xs text-slate-500 col-span-2 text-center py-4">Memuat metode pembayaran...</p>
            </div>
        </div>
    </div>

    <!-- MODAL INPUT -->
    <div id="actionModal" class="hidden fixed inset-0 bg-slate-950/90 flex justify-center items-center z-50 p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl text-slate-800">
            <h3 id="modalTitle" class="text-xl font-bold mb-4">Input Data</h3>
            <div id="inputContent" class="space-y-4"></div>
            <div class="flex gap-2 mt-6">
                <button onclick="window.tutupActionModal()" class="flex-1 py-2 rounded-lg bg-slate-200 font-bold text-slate-800">Batal</button>
                <button onclick="window.submitAction()" class="flex-1 py-2 rounded-lg bg-blue-600 text-white font-bold">Kirim</button>
            </div>
        </div>
    </div>

    <!-- GLOBAL MODERN POPUP -->
    <div id="globalPopup" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex justify-center items-center z-[100] p-4 opacity-0 transition-opacity duration-300">
        <div id="popupContent" class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-2xl p-6 shadow-2xl text-center transform scale-95 transition-transform duration-300">
            <div id="popupIcon" class="text-5xl mb-4 mx-auto"></div>
            <h3 id="popupTitle" class="text-xl font-black text-white mb-2 uppercase italic">Title</h3>
            <p id="popupMessage" class="text-sm text-slate-400 mb-6">Message</p>
            <div id="popupButtons" class="flex gap-3 justify-center">
                <!-- Tombol digenerate otomatis -->
            </div>
        </div>
    </div>

    <div id="modernPopup" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
        <div class="bg-slate-900 border border-slate-700 p-6 rounded-2xl w-4/5 max-w-sm text-center shadow-2xl">
            <h2 id="modernPopupTitle" class="text-white font-bold text-lg mb-2"></h2>
            <p id="modernPopupMessage" class="text-slate-400 text-sm mb-6"></p>
            <button onclick="document.getElementById('modernPopup').classList.add('hidden')" 
                    class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl text-white font-bold transition">
                TUTUP
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, arrayRemove, query, collection, where, getDocs, deleteDoc, onSnapshot, increment, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADI5f9vTDZRTMSpuVuAUzX6GNtXcq4kM8",
            authDomain: "parlaywins-new.firebaseapp.com",
            projectId: "parlaywins-new",
            storageBucket: "parlaywins-new.firebasestorage.app",
            messagingSenderId: "1025882923334",
            appId: "1:1025882923334:web:9c8912e08f27e8a7f48547"
        };
      
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- SISTEM POPUP MODERN ---
        window.showPopup = function(title, message, type = 'info', onConfirm = null) {
            const popup = document.getElementById('globalPopup');
            const content = document.getElementById('popupContent');
            const icon = document.getElementById('popupIcon');
            const buttonsEl = document.getElementById('popupButtons');

            document.getElementById('popupTitle').innerText = title;
            document.getElementById('popupMessage').innerText = message;

            if (type === 'success') icon.innerHTML = '<i class="fa-solid fa-circle-check text-green-500 text-5xl mb-4"></i>';
            else if (type === 'error') icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 text-5xl mb-4"></i>';
            else if (type === 'warning') icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-yellow-500 text-5xl mb-4"></i>';
            else icon.innerHTML = '<i class="fa-solid fa-circle-info text-blue-500 text-5xl mb-4"></i>';

            if (onConfirm) {
                buttonsEl.innerHTML = `
                    <button id="btnCancel" class="flex-1 py-2.5 rounded-xl bg-slate-800 text-white font-bold">Batal</button>
                    <button id="btnConfirm" class="flex-1 py-2.5 rounded-xl bg-blue-600 text-white font-bold">Oke</button>
                `;
                document.getElementById('btnCancel').onclick = () => window.closePopup();
                document.getElementById('btnConfirm').onclick = () => {
                    onConfirm();
                    window.closePopup();
                };
            } else {
                buttonsEl.innerHTML = `<button onclick="window.closePopup()" class="w-full py-3 rounded-xl bg-blue-600 text-white font-bold">Oke</button>`;
            }

            popup.classList.remove('hidden');
            setTimeout(() => {
                popup.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        };

        window.closePopup = function() {
            const popup = document.getElementById('globalPopup');
            const content = document.getElementById('popupContent');
            popup.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => popup.classList.add('hidden'), 300);
        };

        // --- FUNGSI AUTENTIKASI ---
        window.login = async function() {
            const emailInput = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if(!emailInput || !password) return window.showPopup("Gagal Masuk", "Mohon isi semua data (Email dan Password)!", "error");
            
            const email = emailInput.includes('@') ? emailInput : emailInput + "@cvtaruhan.com";
            const loginBtn = document.querySelector('#loginForm button');
            loginBtn.innerText = "Memproses...";
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                window.showPopup("Gagal Masuk", "Email atau Password salah!", "error");
                loginBtn.innerText = "Masuk";
            }
        };
      
        window.toggleForm = (view) => {
            if(view === 'register') {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            } else {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            }
        };

        window.register = async function() {
            const emailInput = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;
            const passConfirm = document.getElementById('regConfirm').value;
            if(!emailInput || !pass) return window.showPopup("Pendaftaran Gagal", "Data pendaftaran tidak boleh kosong!", "error");
            if(pass !== passConfirm) return window.showPopup("Pendaftaran Gagal", "Password dan Konfirmasi Password tidak sama!", "error");
            if(pass.length < 6) return window.showPopup("Pendaftaran Gagal", "Password minimal harus 6 karakter!", "error");
            
            const email = emailInput.includes('@') ? emailInput : emailInput + "@cvtaruhan.com";
            const regBtn = document.querySelector('#registerForm button');
            regBtn.innerText = "Memproses...";
            
            try { 
                const c = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", c.user.uid), { balance: 0, lobbyHistory: [] });
                window.showPopup("Berhasil!", "Pendaftaran akun sukses! Silakan masuk.", "success");
                window.toggleForm('login');
            } catch(e) { 
                window.showPopup("Terjadi Kesalahan", e.message, "error"); 
            } finally {
                regBtn.innerText = "Daftar Akun";
            }
        };

        window.logout = function() { signOut(auth).then(() => location.reload()); };

        // --- SISTEM SESI LOGIN ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                renderDashboard(user);
                loadPaymentMethods(); // Load metode pembayaran untuk deposit modal
            } else {
                document.getElementById('authView').classList.remove('hidden');
                document.getElementById('dashboardView').classList.add('hidden');
                document.getElementById('userMenu').classList.add('hidden');
            }
        });

                // --- FUNGSI RENDER DASHBOARD ---
        function renderDashboard(user) {
            document.getElementById('authView').classList.add('hidden');
            document.getElementById('dashboardView').classList.remove('hidden');
            document.getElementById('userMenu').classList.remove('hidden');
            document.getElementById('userDisplay').innerText = "ID: " + user.email.split('@')[0];

            if (user.email === "admin@cvtaruhan.com") {
                document.getElementById('financeButtons').classList.add('hidden');
                document.getElementById('userActions').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadAdminData();
                window.cleanupOldLobbies();
            } else {
                document.getElementById('lobbyHistorySection').classList.remove('hidden');
                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById('displayBalance').innerText = "Rp " + (data.balance || 0).toLocaleString();
                        const history = data.lobbyHistory || [];
                        
                        document.getElementById('historyList').innerHTML = history.map(item => {
                            const date = item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleString('id-ID') : new Date().toLocaleString('id-ID');
                            // FITUR BARU: Ditambahkan flex gap dan tombol hapus riwayat lobby
                            return `<div class="bg-slate-800 p-3 rounded-lg mb-2 border border-slate-700">
                                        <div class="flex justify-between items-center mb-1">
                                            <span class="text-white font-bold tracking-wider">${item.code || item}</span>
                                            <span class="text-[9px] text-slate-500 font-mono">${date}</span>
                                        </div>
                                        <div class="flex gap-2">
                                            <button onclick="window.location.href='lobby.html?id=${item.code || item}'" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-1.5 rounded-lg text-xs font-bold transition">
                                                MASUK KEMBALI
                                            </button>
                                            <button onclick="window.hapusRiwayatLobby('${item.code || item}')" class="bg-red-600 hover:bg-red-500 text-white px-3 py-1.5 rounded-lg text-xs transition" title="Hapus dari Riwayat">
                                                <i class="fa-solid fa-trash"></i>
                                            </button>
                                        </div>
                                    </div>`;
                        }).join('') || '<p class="text-xs text-slate-500 text-center">Belum ada riwayat.</p>';
                    }
                });
            }
        }

        // --- FUNGSI HAPUS RIWAYAT LOBBY (USER) ---
        window.hapusRiwayatLobby = async function(code) {
            window.showPopup("Hapus Riwayat", "Apakah Anda yakin ingin menghapus lobby ini dari riwayat Anda?", "warning", async () => {
                try {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), {
                        lobbyHistory: arrayRemove(code)
                    });
                } catch(e) {
                    window.showPopup("Gagal", e.message, "error");
                }
            });
        };

        // --- LOAD METODE PEMBAYARAN KE MODAL USER ---
        function loadPaymentMethods() {
            onSnapshot(collection(db, "payment_methods"), (snap) => {
                const depositGrid = document.getElementById('depositMethodsGrid');
                let html = "";
                snap.forEach(d => {
                    const data = d.data();
                    html += `<button onclick="window.pilihBank('${data.bank}', '${data.bank}', '${data.rek}')" class="bg-white p-3 rounded-lg shadow text-slate-800 font-bold flex flex-col items-center justify-center gap-2 hover:bg-slate-50 transition">
                                ${data.logo ? `<img src="${data.logo}" class="h-8 object-contain" alt="${data.bank}">` : `<span class="text-lg"><i class="fa-solid fa-building-columns"></i></span>`}
                                <span class="text-xs">${data.bank}</span>
                             </button>`;
                });
                
                if (html) {
                    depositGrid.innerHTML = html;
                } else {
                    depositGrid.innerHTML = `<p class="text-xs text-slate-500 col-span-2 text-center py-4">Belum ada metode pembayaran yang tersedia.</p>`;
                }
            });
        }
        // --- FUNGSI MODAL ---
        window.bukaModalDeposit = () => document.getElementById('depositModal').classList.remove('hidden');
        window.tutupModalDeposit = () => document.getElementById('depositModal').classList.add('hidden');
        window.tutupActionModal = () => document.getElementById('actionModal').classList.add('hidden');

        window.pilihBank = (tipe, nama, info) => {
            window.tutupModalDeposit();
            document.getElementById('actionModal').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = "Deposit " + tipe;
            document.getElementById('inputContent').innerHTML = `
    <p class="text-sm text-slate-600 mb-2">Tujuan Transfer: <strong>${info}</strong></p>
    <input type="text" id="inputNominal" placeholder="Jumlah Nominal" class="w-full p-3 border rounded-lg text-sm mb-3" oninput="formatRupiah(this)">
    <input type="text" id="inputRek" placeholder="Masukkan Nama Pengirim" class="w-full p-3 border rounded-lg text-sm mb-3">
    <label class="block text-sm font-bold text-slate-700 mt-2">Upload Bukti (Opsional):</label>
    <input type="file" id="inputBukti" accept="image/*" class="w-full p-2 border rounded-lg text-xs">
`;
        };

        window.bukaWithdraw = () => {
            document.getElementById('actionModal').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = "Withdraw Akun";
            document.getElementById('inputContent').innerHTML = `
    <input type="text" id="inputBank" placeholder="Nama Bank (Misal: BCA, DANA)" class="w-full p-3 border rounded-lg text-sm mb-3">
    <input type="text" id="inputRek" placeholder="Nomor Rekening Anda" class="w-full p-3 border rounded-lg text-sm mb-3">
    <input type="text" id="inputAtasNama" placeholder="Atas Nama (Pemilik Rekening)" class="w-full p-3 border rounded-lg text-sm mb-3">
    <input type="text" id="inputNominal" placeholder="Jumlah Withdraw" class="w-full p-3 border rounded-lg text-sm mb-3" oninput="formatRupiah(this)">
`;
        };

        window.submitAction = async () => {
            const title = document.getElementById('modalTitle').innerText;
            const nominal = window.hapusFormat(document.getElementById('inputNominal')?.value);
            const rek = document.getElementById('inputRek')?.value;
            const bank = document.getElementById('inputBank')?.value;
            const atasNama = document.getElementById('inputAtasNama')?.value;
            
            // Ambil ID User dari Email
            const username = auth.currentUser.email.split('@')[0]; 

            if(!nominal || !rek) return window.showPopup("Gagal", "Mohon isi nominal dan data pengirim/rekening dengan lengkap!", "error");

            const userRef = doc(db, "users", auth.currentUser.uid);
            const userSnap = await getDoc(userRef);

            // Buat fungsi submit terpisah agar bisa menunggu konversi gambar
            const prosesEksekusiDatabase = async (buktiGambarBase64 = null) => {
                try {
                    if (title.includes("Withdraw")) {
                        if (userSnap.data().balance < nominal) return window.showPopup("Gagal", "Saldo tidak mencukupi!", "error");
                        if (!bank || !atasNama) return window.showPopup("Gagal", "Nama Bank dan Atas Nama wajib diisi!", "error");

                        await updateDoc(userRef, { balance: increment(-nominal) });
                        await setDoc(doc(db, "withdraws", auth.currentUser.uid + "_" + Date.now()), {
                            uid: auth.currentUser.uid,
                            username: username, // Simpan nama ID
                            amount: nominal,
                            bank: bank,
                            rek: rek,
                            atasNama: atasNama,
                            status: "pending",
                            timestamp: new Date()
                        });
                    } else {
                        await setDoc(doc(db, "deposits", auth.currentUser.uid + "_" + Date.now()), {
                            uid: auth.currentUser.uid,
                            username: username, // Simpan nama ID
                            amount: nominal,
                            rek: rek, // Digunakan untuk Nama Pengirim
                            buktiLink: buktiGambarBase64, // Simpan link gambar
                            status: "pending",
                            timestamp: new Date()
                        });
                    }
                    window.tutupActionModal();
                    window.showPopup("Berhasil!", "Permintaan berhasil dikirim! Silakan tunggu konfirmasi Admin.", "success");
                } catch(e) {
                    window.showPopup("Terjadi Kesalahan", e.message, "error");
                }
            };

            // Proses upload bukti foto jika ada
            const inputBukti = document.getElementById('inputBukti');
            if (inputBukti && inputBukti.files.length > 0) {
                const file = inputBukti.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    prosesEksekusiDatabase(e.target.result);
                };
                reader.readAsDataURL(file);
            } else {
                prosesEksekusiDatabase(null); // Tanpa foto
            }
        };

        // --- FUNGSI LOBBY ---
        window.createLobby = async function() {
            const id = Math.random().toString(36).substring(2, 8).toUpperCase();
            try {
                await setDoc(doc(db, "lobbies", id), { 
                    createdAt: new Date(), 
                    status: "waiting", 
                    players: {},
                    adminCalled: false 
                });
                await updateDoc(doc(db, "users", auth.currentUser.uid), { 
                    lobbyHistory: arrayUnion(id) 
                });
                window.location.href = `lobby.html?id=${id}`;
            } catch (e) { 
                window.showPopup("Gagal", "Gagal membuat lobby: " + e.message, "error"); 
            }
        };

        window.joinLobby = async function() { 
            const code = document.getElementById('joinCode').value.toUpperCase();
            if(code) {
                await setDoc(doc(db, "users", auth.currentUser.uid), { lobbyHistory: arrayUnion(code) }, { merge: true });
                window.location.href = `lobby.html?id=${code}`;
            } else {
                window.showPopup("Perhatian", "Silakan masukkan kode lobby terlebih dahulu!", "warning");
            }
        };

        window.cleanupOldLobbies = async function() {
            const twentyFourHoursAgo = new Date(Date.now() - 86400000);
            const q = query(collection(db, "lobbies"), where("createdAt", "<", twentyFourHoursAgo));
            const snap = await getDocs(q);
            snap.forEach(d => deleteDoc(d.ref));
        };

        // --- FUNGSI ADMIN ---
        window.savePayment = async function() {
            const bank = document.getElementById('payBank').value;
            const rek = document.getElementById('payRek').value;
            const logo = document.getElementById('payLogo').value;
            
            if(!bank || !rek) return window.showPopup("Gagal", "Nama Bank/E-Wallet dan Nomor Rekening wajib diisi!", "error");
            
            try {
                await addDoc(collection(db, "payment_methods"), { 
                    bank, rek, logo, createdAt: new Date() 
                });
                document.getElementById('payBank').value = '';
                document.getElementById('payRek').value = '';
                document.getElementById('payLogo').value = '';
                window.showPopup("Berhasil", "Metode pembayaran baru berhasil ditambahkan!", "success");
            } catch(e) { 
                window.showPopup("Gagal", e.message, "error"); 
            }
        };

        window.hapusPaymentAdmin = async function(id) {
            window.showPopup("Hapus Metode", "Yakin ingin menghapus metode pembayaran ini?", "warning", async () => {
                await deleteDoc(doc(db, "payment_methods", id));
            });
        };

        window.tutupLobbyAdmin = async function(id) {
            window.showPopup("Tutup Lobby", `Yakin ingin menutup dan menghapus lobby ${id}?`, "warning", async () => {
                try {
                    await deleteDoc(doc(db, "lobbies", id));
                } catch(e) {
                    window.showPopup("Gagal", e.message, "error");
                }
            });
        };

                               
                        function loadAdminData() {
            // Pop-up internal untuk melihat foto bukti transfer
            window.lihatBuktiFoto = function(base64Data) {
                let modal = document.getElementById('imageViewerModal');
                if (!modal) {
                    modal = document.createElement('div');
                    modal.id = 'imageViewerModal';
                    modal.className = 'fixed inset-0 bg-black/95 z-[9999] flex flex-col items-center justify-center p-4 hidden';
                    modal.innerHTML = `
                        <div class="relative max-w-full max-h-[85vh] flex flex-col items-center gap-4">
                            <img id="viewerImage" src="" class="max-w-full max-h-[70vh] rounded-lg object-contain border border-slate-700 shadow-2xl">
                            <button onclick="document.getElementById('imageViewerModal').classList.add('hidden')" class="bg-red-600 hover:bg-red-500 text-white font-bold px-6 py-2.5 rounded-xl text-xs transition tracking-wider shadow-lg">
                                TUTUP FOTO
                            </button>
                        </div>
                    `;
                    document.body.appendChild(modal);
                }
                document.getElementById('viewerImage').src = base64Data;
                modal.classList.remove('hidden');
            };

            // PERBAIKAN MUTLAK: Paksa konversi String ke Number dengan parseInt()
            window.setWinner = async function(lobbyId, winnerUid, winnerName) {
                window.showPopup(
                    "Tentukan Pemenang", 
                    `Apakah Anda yakin ingin menetapkan ${winnerName} sebagai pemenang dari Lobby ini?`, 
                    "warning", 
                    async () => {
                        try {
                            const lobbyRef = doc(db, "lobbies", lobbyId);
                            const lobbySnap = await getDoc(lobbyRef);
                            if (!lobbySnap.exists()) return window.showPopup("Gagal", "Data lobby tidak ditemukan!", "error");
                            
                            const lobbyData = lobbySnap.data();
                            let totalPool = 0;
                            
                            // PERBAIKAN DI SINI: Gunakan parseInt() agar taruhan dijumlahkan sebagai angka murni
                            if (lobbyData.players) {
                                for (let key in lobbyData.players) {
                                        const taruhanPemain = parseInt(lobbyData.players[key].bet) || 0;
                                        totalPool += taruhanPemain;
                                }
                            }

                            let potongan = 0;

                            // Struktur Potongan Admin Sesuai Daftar Terbaru
if (totalPool <= 50000) {
    potongan = 5000;
} else if (totalPool <= 100000) {
    potongan = 10000;
} else if (totalPool <= 300000) {
    potongan = 20000;
} else if (totalPool <= 500000) {
    potongan = 30000;
} else if (totalPool <= 800000) {
    potongan = 50000;
} else if (totalPool <= 1300000) {
    potongan = 80000;
} else if (totalPool <= 2000000) {
    potongan = 120000;
} else if (totalPool <= 3000000) {
    potongan = 170000;
} else if (totalPool <= 5000000) {
    potongan = 250000;
} else if (totalPool <= 8000000) {
    potongan = 350000;
} else if (totalPool <= 13000000) {
    potongan = 500000;
} else if (totalPool <= 20000000) {
    potongan = 700000;
} else if (totalPool <= 40000000) {
    potongan = 1000000;
} else if (totalPool <= 60000000) {
    potongan = 1500000;
} else if (totalPool <= 80000000) {
    potongan = 2000000;
} else if (totalPool <= 100000000) {
    potongan = 2500000;
} else {
    potongan = 0; // Jika totalPool melebihi 100 juta
}

                            // Hitung sisa uang bersih untuk pemenang
                            const hadiahBersih = totalPool - potongan;

                            // Kirim saldo bersih ke akun pemenang
                            const userRef = doc(db, "users", winnerUid);
                            await setDoc(userRef, { balance: increment(hadiahBersih) }, { merge: true });

                            // Update status ruangan/lobby di database
                            await updateDoc(lobbyRef, { 
                                winner: winnerUid, 
                                status: "finished",
                                adminFeeApplied: potongan,
                                totalPrizeNet: hadiahBersih
                            });

                            window.showPopup(
                                "Selesai!", 
                                `Hadiah Rp ${hadiahBersih.toLocaleString()} berhasil masuk ke dompet ${winnerName}. (Potongan Admin: Rp ${potongan.toLocaleString()})`, 
                                "success"
                            );
                        } catch (e) {
                            window.showPopup("Gagal Proses", e.message, "error");
                        }
                    }
                );
            };

            const qLobby = query(collection(db, "lobbies"), where("status", "!=", "finished"));
            onSnapshot(qLobby, (snap) => {
                const wadahLobby = document.getElementById('adminLobbyList');
                if (!wadahLobby) return;
                let htmlLobby = '';
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    let p1 = "Menunggu...", p2 = "Menunggu...", uid1 = null, uid2 = null, bet1 = 0, bet2 = 0;
                    if (data.players) {
                        const uids = Object.keys(data.players);
                        if (uids.length > 0) { uid1 = uids[0]; p1 = data.players[uid1].username; bet1 = parseInt(data.players[uid1].bet) || 0; }
                        if (uids.length > 1) { uid2 = uids[1]; p2 = data.players[uid2].username; bet2 = parseInt(data.players[uid2].bet) || 0; }
                    }
                    const isPanggilAdmin = (data.status === "admin_called" || data.adminCalled === true);
                    
                    let adminActions = `<button onclick="window.location.href='lobby.html?id=${docSnap.id}'" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg font-bold text-xs mb-2 transition">Masuk ke Ruangan</button>`;
                    
                    if (!isPanggilAdmin && !data.winner) {
                        adminActions += `<button onclick="window.tutupLobbyAdmin('${docSnap.id}')" class="w-full bg-red-600 hover:bg-red-500 text-white py-2 rounded-lg font-bold text-xs mb-2 transition">Tutup Lobby</button>`;
                    }

                    if (uid1 && uid2 && !data.winner) {
                        adminActions += `<div class="flex gap-2 border-t border-slate-800 pt-2"><button onclick="window.setWinner('${docSnap.id}', '${uid1}', '${p1}')" class="w-1/2 bg-yellow-600 text-black py-2 rounded font-black text-[10px]">Menang ${p1}</button><button onclick="window.setWinner('${docSnap.id}', '${uid2}', '${p2}')" class="w-1/2 bg-yellow-600 text-black py-2 rounded font-black text-[10px]">Menang ${p2}</button></div>`;
                    } else if (data.winner) {
                        adminActions += `<div class="text-center text-blue-500 font-bold text-xs mt-2 uppercase">Selesai</div>`;
                    }
                    htmlLobby += `<div class="bg-slate-900 p-4 rounded-xl border ${isPanggilAdmin ? 'border-red-500' : 'border-slate-700'} mb-3"><div class="flex justify-between mb-2"><span class="font-black text-blue-400 text-sm">LOBBY: ${docSnap.id}</span></div><div class="flex justify-between text-white text-xs mb-3"><span>${p1}: Rp ${bet1.toLocaleString()}</span><span class="font-bold text-slate-500">VS</span><span>${p2}: Rp ${bet2.toLocaleString()}</span></div>${adminActions}</div>`;
                });
                wadahLobby.innerHTML = htmlLobby || '<p class="text-slate-500 text-center text-sm">Belum ada lobby aktif.</p>';
            });

            onSnapshot(collection(db, "payment_methods"), (snap) => {
                let html = "";
                snap.forEach(d => {
                    const data = d.data();
                    html += `<div class="flex justify-between items-center bg-slate-800 p-3 rounded-lg border border-slate-700">
                                <div class="flex items-center gap-3">
                                    ${data.logo ? `<img src="${data.logo}" class="w-8 h-8 object-contain bg-white rounded p-1">` : `<div class="w-8 h-8 bg-slate-700 rounded flex items-center justify-center"><i class="fa-solid fa-building-columns text-slate-400 text-xs"></i></div>`}
                                    <div class="text-xs text-slate-300">
                                        <b class="text-white">${data.bank}</b><br>
                                        ${data.rek}
                                    </div>
                                </div>
                                <button onclick="window.hapusPaymentAdmin('${d.id}')" class="text-red-500 hover:text-red-400 bg-red-500/10 p-2 rounded">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                             </div>`;
                });
                document.getElementById('paymentListAdmin').innerHTML = html || '<p class="text-xs text-slate-500 text-center">Belum ada metode pembayaran yang dikonfigurasi.</p>';
            });

            window.approve = async function(id) {
                try {
                    const snap = await getDoc(doc(db, "deposits", id));
                    const data = snap.data();
                    await updateDoc(doc(db, "deposits", id), { status: "approved" });
                    await setDoc(doc(db, "users", data.uid), { balance: increment(data.amount) }, { merge: true });
                    window.showPopup("Berhasil", "Transaksi deposit berhasil disetujui!", "success");
                } catch(e) {
                    window.showPopup("Gagal", "Gagal menyetujui transaksi: " + e.message, "error");
                }
            };

            window.approveWithdraw = async function(id) {
                try {
                    await updateDoc(doc(db, "withdraws", id), { status: "approved" });
                    window.showPopup("Berhasil", "Withdraw disetujui! Permintaan langsung dibersihkan.", "success");
                } catch(e) {
                    window.showPopup("Gagal", "Error: " + e.message, "error");
                }
            };

            const adminListWadah = document.getElementById('adminList');
            if (adminListWadah) {
                adminListWadah.innerHTML = `
                    <div id="wadahDeposits"></div>
                    <div id="wadahWithdraws"></div>
                `;
            }

            // Realtime Listener untuk Deposit
            onSnapshot(collection(db, "deposits"), (snap) => {
                let html = "";
                snap.forEach(d => {
                    const data = d.data();
                    if (data.status === "pending") {
                        const displayId = data.username || data.uid;
                        
                        html += `<div class="bg-slate-800 p-4 rounded-xl border border-yellow-500 mb-3 text-sm">
                                    <p class="font-bold text-white mb-1">User: <span class="text-yellow-400">${displayId}</span></p>
                                    <p class="text-blue-400 font-black text-lg mb-1">Rp ${data.amount.toLocaleString()}</p>
                                    <p class="text-xs text-slate-300 mb-3">Pengirim: <b class="text-white">${data.rek}</b></p>
                                    ${data.buktiLink ? 
                                        `<button onclick="window.lihatBuktiFoto('${data.buktiLink}')" class="block w-full bg-green-700 hover:bg-green-600 text-white text-center py-2 rounded-lg font-bold text-xs mb-3 transition shadow">LIHAT BUKTI FOTO</button>` 
                                        : '<p class="text-xs text-red-500 mb-3 italic text-center bg-red-500/10 py-1 rounded">User tidak mengupload bukti</p>'}
                                    <button onclick="window.approve('${d.id}')" class="w-full bg-blue-600 hover:bg-blue-500 py-2 rounded-lg font-bold text-white transition">Setujui Deposit</button>
                                 </div>`;
                    }
                });
                
                const wadahDep = document.getElementById('wadahDeposits');
                if (wadahDep) wadahDep.innerHTML = html;
            });

            // Realtime Listener untuk Withdraw
            onSnapshot(collection(db, "withdraws"), (snap) => {
                let html = "";
                snap.forEach(d => {
                    const data = d.data();
                    if (data.status === "pending") {
                        const displayId = data.username || data.uid;
                        
                        html += `<div class="bg-slate-800 p-4 rounded-xl border border-red-500 mb-3 text-sm mt-3">
                                    <p class="font-bold text-white mb-1">User: <span class="text-red-400">${displayId}</span></p>
                                    <p class="text-red-400 font-black text-lg mb-2">Rp ${data.amount.toLocaleString()} (WD)</p>
                                    
                                    <div class="bg-slate-900 border border-slate-700 p-3 rounded-lg mb-3">
                                        <p class="text-[10px] text-slate-400 mb-1 tracking-wider">TUJUAN TRANSFER:</p>
                                        <p class="text-xs text-slate-300">Bank: <b class="text-white">${data.bank || '-'}</b></p>
                                        <p class="text-xs text-slate-300">No. Rek: <b class="text-white">${data.rek}</b></p>
                                        <p class="text-xs text-slate-300">Atas Nama: <b class="text-white">${data.atasNama || '-'}</b></p>
                                    </div>
                                    
                                    <button onclick="window.approveWithdraw('${d.id}')" class="w-full bg-red-600 hover:bg-red-500 py-2 rounded-lg font-bold text-white transition">Tandai Sudah Ditransfer</button>
                                 </div>`;
                    }
                });
                
                const wadahWd = document.getElementById('wadahWithdraws');
                if (wadahWd) wadahWd.innerHTML = html;
                
                const wadahDep = document.getElementById('wadahDeposits');
                if (adminListWadah && wadahDep && !wadahDep.innerHTML && !html) {
                     adminListWadah.innerHTML = '<p class="text-slate-500 text-center text-sm py-4">Tidak ada permintaan transaksi pending.</p><div id="wadahDeposits"></div><div id="wadahWithdraws"></div>';
                }
            });
        }
    </script>
    <script>
    window.formatRupiah = function(element) {
        let val = element.value.replace(/[^0-9]/g, '');
        if (val) {
            element.value = parseInt(val, 10).toLocaleString('id-ID');
        } else {
            element.value = '';
        }
    };
    window.hapusFormat = function(rupiahString) {
        if (!rupiahString) return 0;
        return parseInt(rupiahString.toString().replace(/\./g, ''), 10) || 0;
    };
    </script>
