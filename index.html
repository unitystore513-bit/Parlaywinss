<!DOCTYPE HTML>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParlayWins - Portal Utama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.85); z-index: 50; align-items: center; justify-content: center; padding: 1rem; }
    </style>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body class="bg-slate-950 text-white font-sans">

    <!-- ================= PANEL LOGIN & DAFTAR (AUTH) ================= -->
    <div id="auth-screen" class="max-w-md mx-auto min-h-screen flex flex-col justify-center items-center px-6 bg-slate-900 border-x border-slate-800">
        <div class="w-full space-y-6 bg-slate-950 p-6 rounded-3xl border border-slate-800 shadow-xl">
            <div class="text-center space-y-2">
                <span class="text-4xl">⚽</span>
                <h2 id="auth-title" class="text-2xl font-black text-emerald-400 italic tracking-wider">MASUK AKUN</h2>
                <p id="auth-subtitle" class="text-xs text-slate-400">Silakan masuk menggunakan username Anda</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1">USERNAME</label>
                    <input id="auth-username" type="text" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-emerald-500" placeholder="Masukkan username">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1">PASSWORD</label>
                    <input id="auth-password" type="password" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-emerald-500" placeholder="Masukkan password">
                </div>
            </div>

            <div class="space-y-3 pt-2">
                <button id="btn-primary-auth" onclick="handleAuth()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl font-bold text-sm shadow-lg shadow-emerald-600/20 transition">
                    Masuk Sekarang
                </button>
                <button id="btn-toggle-auth" onclick="toggleAuthMode()" class="w-full bg-transparent text-xs text-slate-400 hover:text-white py-1 transition">
                    Belum punya akun? Daftar di sini
                </button>
            </div>
        </div>
    </div>


    <!-- ================= UTAMA APLIKASI WEB USER (HIDDEN SEBELUM LOGIN) ================= -->
    <div id="main-app" class="max-w-md mx-auto min-h-screen bg-slate-900 shadow-2xl relative pb-24 border-x border-slate-800 hidden">
        
        <!-- TOP BAR NAVIGASI -->
        <div class="p-4 flex justify-between items-center bg-slate-900/80 backdrop-blur sticky top-0 z-30 border-b border-slate-800">
            <div>
                <button onclick="handleLogout()" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-1.5 rounded-xl font-medium transition">
                    🚪 Keluar
                </button>
            </div>
            <div class="flex items-center gap-3">
                <!-- TIKET SALDO AKUN SPESIFIK -->
                <div class="bg-amber-500/10 border border-amber-500/30 px-3 py-1.5 rounded-xl flex items-center gap-1.5">
                    <span class="text-xs text-amber-400 font-medium">Tiket:</span>
                    <span id="ticket-balance" class="text-sm font-black text-amber-300">0</span>
                    <span class="text-xs">🎟️</span>
                </div>
                <button onclick="toggleModal('modal-deposit', true)" class="bg-emerald-600 hover:bg-emerald-700 text-xs font-bold px-4 py-2 rounded-xl transition uppercase tracking-wide">
                    DEPOSIT
                </button>
            </div>
        </div>

        <!-- INFO USER LOGGED IN -->
        <div class="px-6 pt-4">
            <p class="text-xs text-slate-400">Selamat datang kembali, <span id="user-display-name" class="text-emerald-400 font-bold">User</span>!</p>
        </div>

        <!-- LOGO BRAND -->
        <div class="p-4 flex items-center justify-center gap-2">
            <span class="text-2xl">⚽</span>
            <h1 class="text-2xl font-black tracking-wider text-emerald-400 italic">PARLAYWINS</h1>
        </div>

        <!-- TEXT BANNER UTAMA -->
        <div class="mx-4 p-4 bg-slate-800/60 border border-slate-700 rounded-2xl text-center">
            <p id="view-banner-title" class="text-sm font-semibold text-slate-200">Selamat datang di parlaywins</p>
        </div>

        <!-- DAFTAR PERTANDINGAN DINAMIS -->
        <div class="mt-6 px-4 space-y-4">
            <h3 class="text-xs font-bold tracking-widest text-slate-400 uppercase">PERTANDINGAN HARI INI</h3>
            <div id="match-container" class="space-y-4"></div>
        </div>

        <!-- RUANG TEKS PERINGATAN -->
        <div class="mx-4 mt-6 p-4 bg-amber-500/5 border border-amber-500/20 rounded-2xl">
            <h4 class="text-[11px] font-bold text-amber-500 uppercase tracking-wider mb-1">⚠️ INFO & TEKS PERINGATAN ADMIN</h4>
            <p id="view-warning-text" class="text-xs text-amber-200/80 leading-relaxed">Memuat teks...</p>
        </div>

        <!-- FLOATING WA BUTTON -->
        <a id="wa-link" href="#" target="_blank" class="fixed bottom-6 right-6 bg-emerald-500 p-4 rounded-full shadow-lg hover:bg-emerald-600 transition z-40">
            <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.457L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.799.002-2.63-1.023-5.101-2.885-6.966C16.528 1.975 14.066 1.05 11.455 1.05 6.023 1.05 1.6 5.419 1.597 10.85c-.001 1.702.447 3.366 1.3 4.803l-1.02 3.725 3.82-1.002zm12.353-5.38c-.33-.165-1.951-.963-2.251-1.073-.3-.109-.518-.165-.736.165-.218.33-.845 1.073-1.036 1.292-.19.218-.38.245-.71.082-1.203-.603-2.004-1.066-2.805-2.442-.21-.362.21-.336.6-.112.35.201.38.245.57.518.19.273.09.518-.01.71-.1.192-.736 1.774-.903 2.184-.165.409-.33.355-.66.19-1.256-.627-2.15-1.263-2.905-2.564-.197-.34-.02-.524.15-.694.152-.153.33-.355.495-.532.165-.18.22-.3.33-.5.11-.197.055-.382-.028-.546-.082-.165-.736-1.774-1.009-2.43-.267-.64-.54-.554-.736-.564-.19-.01-.409-.01-.628-.01-.218 0-.573.082-.873.409-.3.33-1.146 1.119-1.146 2.728 0 1.61 1.173 3.165 1.336 3.383.165.218 2.307 3.522 5.59 4.943.78.337 1.39.539 1.864.69.784.249 1.498.214 2.062.13.629-.094 1.951-.798 2.224-1.57.273-.772.273-1.434.19-1.57-.081-.136-.3-.218-.63-.383z"/></svg>
        </a>
    </div>

    <!-- MODAL DEPOSIT UI MODERN -->
    <div id="modal-deposit" class="modal">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl w-full max-w-sm shadow-2xl relative text-center space-y-4">
            <h3 class="text-lg font-black text-emerald-400 uppercase tracking-wide">💳 Top Up Tiket VIP</h3>
            
            <div class="bg-slate-950 p-3 rounded-2xl space-y-3 border border-slate-800">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Metode Pembayaran Resmi</p>
                <div id="deposit-qris-container" class="hidden justify-center">
                    <img id="deposit-qris-img" src="" alt="QRIS Admin" class="max-h-40 rounded-lg border border-slate-800 shadow">
                </div>
                <div id="deposit-bank-text" class="text-xs text-slate-300 font-mono whitespace-pre-line text-left bg-slate-900 p-2 rounded border border-slate-800"></div>
            </div>

            <div class="space-y-3 text-left">
                <div>
                    <label class="text-[10px] text-slate-400 font-bold block mb-1">USERNAME AKUN ANDA</label>
                    <input id="dep-username" type="text" class="w-full p-2 bg-slate-800 rounded-xl text-xs border border-slate-700 text-slate-300 font-bold" readonly>
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 font-bold block mb-1">PILIH PAKET TIKET</label>
                    <select id="dep-paket" class="w-full p-2 bg-slate-800 rounded-xl text-xs border border-slate-700 text-white">
                        <option value="20rb|2">Rp 20.000 (Dapat 2 Tiket)</option>
                        <option value="45rb|4">Rp 45.000 (Dapat 4 Tiket)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 font-bold block mb-1">BUKTI PEMBAYARAN / NOMOR REFERENSI</label>
                    <textarea id="dep-bukti" rows="2" class="w-full p-2 bg-slate-800 rounded-xl text-xs border border-slate-700 text-white" placeholder="Contoh: Transfer Mandiri An. Budi / Ref 001923"></textarea>
                </div>
            </div>

            <div class="flex gap-2 pt-2">
                <button onclick="toggleModal('modal-deposit', false)" class="flex-1 bg-slate-800 text-slate-400 text-xs py-2.5 rounded-xl font-bold">Tutup</button>
                <button onclick="submitDepositForm()" class="flex-1 bg-emerald-600 text-white text-xs py-2.5 rounded-xl font-bold">Kirim Bukti</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP JAVASCRIPT SYSTEM -->
    <script>
        let isLoginMode = true;
        let currentUser = sessionStorage.getItem('currentUser') || null;

        window.onload = function() {
            checkAuthSession();
        };

        function checkAuthSession() {
            if (currentUser) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display-name').innerText = currentUser;
                document.getElementById('dep-username').value = currentUser;
                
                updateTicketDisplay();
                loadConfiguration();
                renderMatches();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'MASUK AKUN' : 'DAFTAR AKUN';
            document.getElementById('auth-subtitle').innerText = isLoginMode ? 'Silakan masuk menggunakan username Anda' : 'Buat akun parlaywins baru Anda';
            document.getElementById('btn-primary-auth').innerText = isLoginMode ? 'Masuk Sekarang' : 'Daftar Sekarang';
            document.getElementById('btn-toggle-auth').innerText = isLoginMode ? 'Belum punya akun? Daftar di sini' : 'Sudah punya akun? Login di sini';
        }

        function handleAuth() {
            const user = document.getElementById('auth-username').value.trim().toLowerCase();
            const pass = document.getElementById('auth-password').value.trim();

            if (!user || !pass) {
                alert('Username dan Password wajib diisi!');
                return;
            }

            if (!isLoginMode) {
                // REGISTER MODE
                if (localStorage.getItem('pwd_' + user)) {
                    alert('Username sudah terdaftar! Gunakan nama lain.');
                    return;
                }
                localStorage.setItem('pwd_' + user, pass);
                localStorage.setItem('tickets_' + user, '0'); // Init 0 tiket
                alert('Pendaftaran Berhasil! Silakan klik Masuk Sekarang.');
                toggleAuthMode();
            } else {
                // LOGIN MODE
                const storedPassword = localStorage.getItem('pwd_' + user);
                if (storedPassword && storedPassword === pass) {
                    sessionStorage.setItem('currentUser', user);
                    currentUser = user;
                    checkAuthSession();
                } else {
                    alert('Username atau Password salah/tidak ditemukan!');
                }
            }
        }

        function updateTicketDisplay() {
            if (!currentUser) return;
            const balance = localStorage.getItem('tickets_' + currentUser) || '0';
            document.getElementById('ticket-balance').innerText = balance;
        }

        function loadConfiguration() {
            const targetWa = localStorage.getItem('wa') || '62812123847109';
            document.getElementById('wa-link').href = 'https://wa.me/' + targetWa;
            document.getElementById('view-banner-title').innerText = localStorage.getItem('bannerText') || 'Selamat datang di parlaywins';
            document.getElementById('view-warning-text').innerText = localStorage.getItem('warningText') || 'Peringatan: Prediksi bola memiliki risiko.';

            const qrisUrl = localStorage.getItem('qris');
            if(qrisUrl) {
                document.getElementById('deposit-qris-img').src = qrisUrl;
                document.getElementById('deposit-qris-container').style.display = 'flex';
            }
            document.getElementById('deposit-bank-text').innerText = localStorage.getItem('bank-list') || 'Rekening belum diatur admin.';
        }

        function toggleModal(id, show) {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
        }

        function renderMatches() {
            const container = document.getElementById('match-container');
            const matches = JSON.parse(localStorage.getItem('matches') || '[]');
            
            if (matches.length === 0) {
                container.innerHTML = '<p class="text-xs text-center text-slate-500 py-6">Belum ada jadwal pertandingan dari admin.</p>';
                return;
            }

            container.innerHTML = '';
            matches.forEach(m => {
                container.innerHTML += `
                    <div class="bg-slate-800/80 border border-slate-700/60 rounded-3xl p-5 shadow-lg space-y-4">
                        <div class="flex justify-between items-center text-center">
                            <div class="w-1/3 flex flex-col items-center gap-2">
                                <img src="${m.logoHome}" class="w-12 h-12 object-contain" onerror="this.src='https://via.placeholder.com/150'">
                                <span class="text-xs font-bold text-slate-200">${m.home}</span>
                            </div>
                            <div class="w-1/3 text-emerald-400 font-black text-sm tracking-widest">VS</div>
                            <div class="w-1/3 flex flex-col items-center gap-2">
                                <img src="${m.logoAway}" class="w-12 h-12 object-contain" onerror="this.src='https://via.placeholder.com/150'">
                                <span class="text-xs font-bold text-slate-200">${m.away}</span>
                            </div>
                        </div>
                        <button onclick="unlockVipPrediction(${m.id})" class="w-full bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-600 hover:to-amber-700 text-slate-950 font-black text-xs py-3 rounded-xl tracking-wider uppercase transition">
                            🔒 BUKA PREDIKSI VIP (1 Tiket)
                        </button>
                    </div>
                `;
            });
        }

        function unlockVipPrediction(matchId) {
            const vipStatus = localStorage.getItem('vip') || 'Aktif';
            if (vipStatus === "Tidak Aktif") {
                alert("Maaf, Sistem Prediksi VIP sedang dinonaktifkan oleh Admin.");
                return;
            }

            let currentTickets = parseInt(localStorage.getItem('tickets_' + currentUser) || '0');
            if (currentTickets < 1) {
                alert("❌ Tiket Anda Habis! Silakan lakukan DEPOSIT terlebih dahulu.");
                toggleModal('modal-deposit', true);
                return;
            }

            const matches = JSON.parse(localStorage.getItem('matches') || '[]');
            const matchedData = matches.find(m => m.id === matchId);
            if (!matchedData) return alert('Pertandingan tidak ditemukan!');

            currentTickets -= 1;
            localStorage.setItem('tickets_' + currentUser, currentTickets.toString());
            updateTicketDisplay();

            Swal.fire({
          title: '🔥 DETAIL PREDIKSI VIP 🔥',
          html: `
            <div style="text-align: left; font-size: 14px; line-height: 2.2; padding: 10px 5px;">
              <p style="font-size: 16px; font-weight: 900; text-align: center; color: #34d399; margin-bottom: 12px; font-style: italic;">
                ${matchedData.home.toUpperCase()} VS ${matchedData.away.toUpperCase()}
              </p>
              <p>⚽ <b>GOL (O/U):</b> <span style="color: #fbbf24">${matchedData.gol || '-'}</span></p>
              <p>📊 <b>PEMENANG:</b> <span style="color: #fbbf24">${matchedData.win || '-'}</span></p>
              <p>🔄 <b>BTTS:</b> <span style="color: #fbbf24">${matchedData.btts || '-'}</span></p>
              <p>🚩 <b>CORNER:</b> <span style="color: #fbbf24">${matchedData.corner || '-'}</span></p>
            </div>
          `,
          background: '#1e293b',
          color: '#ffffff',
          confirmButtonText: 'Tutup',
          confirmButtonColor: '#059669',
          showCloseButton: true,
          width: '90%',
          customClass: {
            popup: 'rounded-3xl'
          }
        });

        function submitDepositForm() {
            const username = currentUser;
            const paketRaw = document.getElementById('dep-paket').value.split('|');
            const bukti = document.getElementById('dep-bukti').value.trim();

            if (!bukti) {
                alert('Harap isi Bukti Pembayaran!');
                return;
            }

            let deposits = JSON.parse(localStorage.getItem('deposits') || '[]');
            deposits.push({ username, harga: paketRaw[0], tiket: paketRaw[1], bukti, status: 'pending' });
            localStorage.setItem('deposits', JSON.stringify(deposits));

            document.getElementById('dep-bukti').value = '';
            toggleModal('modal-deposit', false);
            alert('✅ Bukti berhasil dikirim! Saldo tiket akan bertambah otomatis jika dikonfirmasi Admin.');
        }

        function handleLogout() {
            sessionStorage.removeItem('currentUser');
            location.reload();
        }
    </script>
</body>
    </html>
