<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CvTaruhan | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <!-- Navbar -->
    <nav class="bg-slate-900 p-4 border-b border-slate-800 flex justify-between items-center">
        <h1 class="font-black italic">CV<span class="text-blue-500">TARUHAN</span></h1>
        <button onclick="logout()" class="text-xs bg-slate-800 px-3 py-1 rounded">Logout</button>
    </nav>

    <main class="max-w-md mx-auto p-4">
        <!-- Dashboard Utama -->
        <div id="dashboardView" class="space-y-4">
            
            <!-- Box Saldo -->
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <p class="text-slate-400 text-xs">Saldo Anda</p>
                <h3 id="displayBalance" class="text-3xl font-black mt-1 mb-5">Rp 0</h3>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="prosesDeposit()" class="bg-slate-800 border border-blue-600 text-blue-400 py-2.5 rounded-xl text-sm font-bold">Deposit</button>
                    <button onclick="prosesWithdraw()" class="bg-slate-800 border border-red-600 text-red-400 py-2.5 rounded-xl text-sm font-bold">Withdraw</button>
                </div>
            </div>

            <!-- Fitur Lobby -->
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                <button onclick="buatLobby()" class="w-full bg-green-600 py-3 rounded-xl font-bold mb-3">Buat Lobby Taruhan Baru</button>
                <div class="flex gap-2">
                    <input type="text" id="kodeLobby" placeholder="Kode Lobby" class="flex-1 bg-slate-950 p-3 rounded-lg border border-slate-700 uppercase">
                    <button onclick="masukLobby()" class="bg-blue-600 px-6 rounded-lg font-bold">Masuk</button>
                </div>
            </div>

            <!-- Riwayat Lobby -->
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                <h2 class="text-sm font-bold mb-3 text-slate-400">Riwayat Lobby</h2>
                <div id="riwayatList" class="space-y-2"></div>
            </div>

            <!-- Admin Panel -->
            <div id="adminPanel" class="hidden bg-slate-900 p-4 rounded-xl border border-yellow-900">
                <h2 class="text-yellow-500 font-bold mb-3">Panel Admin</h2>
                <div id="adminTransList" class="space-y-2"></div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyADI5f9vTDZRTMSpuVuAUzX6GNtXcq4kM8", authDomain: "parlaywins-new.firebaseapp.com", projectId: "parlaywins-new", storageBucket: "parlaywins-new.firebasestorage.app", messagingSenderId: "1025882923334", appId: "1:1025882923334:web:715307a770239023f48547" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Menangani sesi login agar tidak minta login terus
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                tampilkanDashboard(user);
            } else {
                const email = prompt("Masukkan Email:");
                const pass = prompt("Masukkan Password:");
                try { 
                    await signInWithEmailAndPassword(auth, email, pass); 
                } catch(e) { 
                    alert("Gagal login, coba lagi.");
                    location.reload(); 
                }
            }
        });

        // Fungsi Dashboard
        async function tampilkanDashboard(user) {
            // Load Saldo & Riwayat
            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                if(docSnap.exists()){
                    const data = docSnap.data();
                    document.getElementById('displayBalance').innerText = "Rp " + (data.balance || 0).toLocaleString('id-ID');
                    
                    let htmlRiwayat = "";
                    (data.lobbyHistory || []).forEach(kode => {
                        htmlRiwayat += `<div class="bg-slate-800 p-3 rounded flex justify-between"><span>${kode}</span><button onclick="window.location.href='lobby.html?id=${kode}'" class="text-blue-400 font-bold text-xs">Masuk</button></div>`;
                    });
                    document.getElementById('riwayatList').innerHTML = htmlRiwayat || '<p class="text-xs text-slate-600">Belum ada riwayat.</p>';
                }
            });

            // Jika Admin
            if (user.email === "admin@cvtaruhan.com") {
                document.getElementById('adminPanel').classList.remove('hidden');
                onSnapshot(collection(db, "deposits"), (snap) => {
                    let htmlAdmin = "";
                    snap.forEach(d => {
                        if(d.data().status === "pending") {
                            htmlAdmin += `<div class="bg-slate-800 p-2 flex justify-between rounded text-sm"><span>Deposit: Rp ${d.data().amount.toLocaleString()}</span><button onclick="setujui('${d.id}')" class="bg-blue-600 px-2 py-1 rounded">Setujui</button></div>`;
                        }
                    });
                    document.getElementById('adminTransList').innerHTML = htmlAdmin || '<p class="text-xs text-slate-500">Tidak ada pending.</p>';
                });
            }
        }

        // Fungsi Deposit
        window.prosesDeposit = async () => {
            const snap = await getDoc(doc(db, "settings", "payment"));
            const info = snap.exists() ? snap.data().info : "Hubungi admin di WhatsApp.";
            const jumlah = prompt("Transfer ke: " + info + "\n\nMasukkan nominal:");
            
            if(jumlah) {
                await setDoc(doc(db, "deposits", auth.currentUser.uid + "_" + Date.now()), { 
                    uid: auth.currentUser.uid, 
                    amount: parseInt(jumlah), 
                    status: "pending", 
                    timestamp: new Date() 
                });
                alert("Deposit berhasil diproses! Mohon tunggu konfirmasi admin.");
            }
        };

        // Fungsi Admin Setujui
        window.setujui = async (id) => {
            const snap = await getDoc(doc(db, "deposits", id));
            await updateDoc(doc(db, "deposits", id), { status: "approved" });
            await setDoc(doc(db, "users", snap.data().uid), { balance: increment(snap.data().amount) }, { merge: true });
            alert("Saldo telah ditambahkan ke user!");
        };

        window.logout = () => signOut(auth).then(() => location.reload());
        window.buatLobby = () => { /* ... kode buat lobby ... */ };
        window.masukLobby = () => { /* ... kode masuk lobby ... */ };
        window.prosesWithdraw = () => { /* ... kode withdraw ... */ };
    </script>
</body>
</html>
