<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVTARUHAN | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <nav class="p-4 flex justify-between items-center border-b border-slate-800">
        <h1 class="text-xl font-black italic uppercase text-white">CV<span class="text-blue-500">TARUHAN</span></h1>
        <button onclick="logout()" class="text-slate-400"><i class="fa-solid fa-right-from-bracket"></i></button>
    </nav>

    <main class="max-w-md mx-auto p-4">
        <!-- Auth View -->
        <div id="authView" class="mt-10">
            <h2 class="text-2xl font-bold mb-6">Masuk</h2>
            <input type="text" id="email" placeholder="Email" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg mb-4">
            <input type="password" id="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg mb-4">
            <button onclick="login()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Masuk</button>
        </div>

        <!-- Dashboard View -->
        <div id="dashboardView" class="hidden space-y-4">
            <!-- Saldo & Tombol Modern -->
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                <p class="text-slate-400 text-xs">Saldo Anda</p>
                <h3 id="displayBalance" class="text-3xl font-black mt-1 text-white">Rp 0</h3>
                <div class="grid grid-cols-2 gap-3 mt-6">
                    <button onclick="deposit()" class="bg-blue-600 py-2 rounded-xl text-sm font-bold">Deposit</button>
                    <button onclick="withdraw()" class="bg-slate-800 border border-slate-700 py-2 rounded-xl text-sm font-bold">Withdraw</button>
                </div>
            </div>

            <!-- Area Lobby -->
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800">
                <button onclick="createLobby()" class="w-full bg-green-600 py-3 rounded-xl font-bold mb-4">Buat Lobby Taruhan Baru</button>
                <div class="flex gap-2">
                    <input type="text" id="joinCode" placeholder="Kode Lobby" class="w-full bg-slate-950 border border-slate-700 p-3 rounded-xl uppercase text-center font-bold">
                    <button onclick="joinLobby()" class="bg-blue-600 px-6 rounded-xl font-bold">Masuk</button>
                </div>
            </div>

            <!-- Admin Panel -->
            <div id="adminPanel" class="hidden space-y-4">
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <h2 class="font-bold text-yellow-500 text-sm mb-3">Pending Deposit</h2>
                    <div id="adminList" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyADI5f9vTDZRTMSpuVuAUzX6GNtXcq4kM8", authDomain: "parlaywins-new.firebaseapp.com", projectId: "parlaywins-new", storageBucket: "parlaywins-new.firebasestorage.app", messagingSenderId: "1025882923334", appId: "1:1025882923334:web:715307a770239023f48547" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.login = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById('authView').classList.add('hidden');
                document.getElementById('dashboardView').classList.remove('hidden');
                initDashboard();
            } catch (e) { alert("Login Gagal"); }
        };

        function initDashboard() {
            const user = auth.currentUser;
            if(user.email === "admin@cvtaruhan.com") document.getElementById('adminPanel').classList.remove('hidden');
            
            // Real-time Saldo
            onSnapshot(doc(db, "users", user.uid), (doc) => {
                if(doc.exists()) document.getElementById('displayBalance').innerText = "Rp " + (doc.data().balance || 0).toLocaleString();
            });

            // Real-time Deposit Admin
            onSnapshot(collection(db, "deposits"), (snap) => {
                let html = "";
                snap.forEach(d => {
                    if(d.data().status === "pending") {
                        html += `<div class="flex justify-between bg-slate-800 p-3 rounded-lg text-sm">
                            <span>Rp ${d.data().amount.toLocaleString()}</span>
                            <button onclick="approve('${d.id}', '${d.data().uid}', ${d.data().amount})" class="bg-blue-600 px-3 py-1 rounded">Setujui</button>
                        </div>`;
                    }
                });
                document.getElementById('adminList').innerHTML = html;
            });
        }

        window.approve = async (id, uid, amount) => {
            await updateDoc(doc(db, "deposits", id), { status: "approved" });
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);
            const currentBal = userSnap.exists() ? (userSnap.data().balance || 0) : 0;
            await updateDoc(userRef, { balance: currentBal + amount });
            alert("Berhasil!");
        };

        window.createLobby = async () => {
            const amount = prompt("Masukkan nominal taruhan:");
            if(!amount) return;
            const code = Math.random().toString(36).substring(7).toUpperCase();
            await setDoc(doc(db, "lobbies", code), { creator: auth.currentUser.uid, betAmount: parseInt(amount), status: "active" });
            window.location.href = `lobby.html?id=${code}`;
        };

        window.joinLobby = () => {
            const code = document.getElementById('joinCode').value.toUpperCase();
            if(code) window.location.href = `lobby.html?id=${code}`;
        };

        window.deposit = async () => {
            const amt = prompt("Nominal Deposit:");
            if(amt) await setDoc(doc(db, "deposits", auth.currentUser.uid + "_" + Date.now()), { uid: auth.currentUser.uid, amount: parseInt(amt), status: "pending" });
        };

        window.logout = () => { signOut(auth).then(() => location.reload()); };
    </script>
</body>
</html>
