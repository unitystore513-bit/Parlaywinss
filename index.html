<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParlayWins - VIP Match Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1329; color: #f8fafc; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto h-screen flex flex-col justify-center items-center bg-[#0b1329]">
    <!-- 1. GERBANG AUTHENTICATION -->
    
        <div id="auth-container" class="w-full flex flex-col items-center p-6 bg-[#0b1329]">
        <h2 class="text-2xl font-bold text-white mb-6">PARLAYWINS</h2>
        
        <input type="text" id="auth-username" placeholder="Username" class="w-full max-w-sm p-4 mb-4 bg-slate-800 text-white rounded-2xl border border-slate-700">
        <input type="password" id="auth-password" placeholder="Password" class="w-full max-w-sm p-4 mb-6 bg-slate-800 text-white rounded-2xl border border-slate-700">

        <button onclick="handleAuthAction()" class="w-full max-w-sm bg-emerald-500 py-4 rounded-2xl font-bold text-white text-lg shadow-lg hover:bg-emerald-600 transition">
            Masuk Ke Aplikasi
        </button>

        <p class="mt-6 text-slate-400 text-sm">
            Belum punya ID akun? 
            <span onclick="showRegisterAlert()" class="text-emerald-400 font-bold cursor-pointer underline">Daftar</span>
        </p>
        </div>

    <!-- 2. INTERFACE UTAMA (DASHBOARD) -->
    <div id="main-app-container" class="space-y-4 w-full" style="display: none;">
        <!-- Tombol Deposit -->
<div class="fixed top-4 right-4 z-50">
    <button onclick="document.getElementById('modal-deposit').style.display='block'" 
            class="bg-emerald-600 text-white px-4 py-2 rounded-full font-bold text-xs shadow-lg">
            DEPOSIT
    </button>
</div>
        <div class="flex justify-between items-center mb-6">
            <span class="text-xl font-black text-emerald-400">PARLAYWINS</span>
            <button onclick="handleLogout()" class="bg-slate-800 px-4 py-2 rounded-lg text-xs"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>

        <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
            <h2 id="view-banner-title" class="text-sm font-bold">Selamat Datang di Portal Utama</h2>
            <p id="user-profile-name" class="text-[10px] text-emerald-500 font-bold uppercase"></p>
        </div>

        <div id="match-section" class="space-y-3">
    <h3 class="text-[10px] font-bold text-slate-500 uppercase">Pertandingan Hari Ini</h3>
    <div class="bg-slate-900 p-4 rounded-xl flex justify-between items-center border border-slate-700">
        <div class="text-center w-1/3">
            <img id="logo-home" src="" class="w-12 h-12 mx-auto mb-2 rounded-full border border-slate-600 bg-white">
            <span id="view-match-home" class="font-bold text-sm block">HOME</span>
        </div>
        <span class="text-emerald-500 font-black text-xl">VS</span>
        <div class="text-center w-1/3">
            <img id="logo-away" src="" class="w-12 h-12 mx-auto mb-2 rounded-full border border-slate-600 bg-white">
            <span id="view-match-away" class="font-bold text-sm block">AWAY</span>
        </div>
    </div>
        </div>

        <div class="mt-4 p-4 bg-slate-800 rounded-lg border border-slate-700">
    <p class="text-[10px] text-slate-400 font-bold uppercase">Transfer Ke:</p>
    <p id="view-bank-list" class="text-white font-bold text-sm mt-1"></p>
        </div>
    </div>

    <!-- SCRIPT UTAMA -->
    <!-- Modal Deposit -->
<div id="modal-deposit" style="display:none;" class="fixed inset-0 bg-black/80 z-[100] p-4">
    <div class="bg-slate-900 p-6 rounded-2xl max-w-sm mx-auto mt-20">
        <h2 class="text-white font-bold mb-4">Pilih Paket Tiket</h2>
        <div class="space-y-3">
            <button onclick="openPayment('20rb', '2 Tiket')" class="w-full bg-slate-800 p-4 rounded-lg text-left text-emerald-400 font-bold">20rb - 2 Tiket</button>
            <button onclick="openPayment('45rb', '4 Tiket')" class="w-full bg-slate-800 p-4 rounded-lg text-left text-emerald-400 font-bold">45rb - 4 Tiket</button>
        </div>
        <button onclick="this.parentElement.parentElement.style.display='none'" class="mt-4 text-slate-500 text-xs w-full">Tutup</button>
    </div>
</div>

<!-- Form Pembayaran -->
<div id="payment-form" style="display:none;" class="fixed inset-0 bg-black/90 z-[101] p-4">
    <div class="bg-slate-900 p-6 rounded-2xl mt-10">
        <h2 class="text-white font-bold mb-4">Detail Pembayaran</h2>
        <input type="text" id="nama-pengirim" placeholder="Nama Pengirim" class="w-full p-2 mb-2 bg-slate-800 rounded text-white">
        <select id="bank-asal" class="w-full p-2 mb-4 bg-slate-800 rounded text-white text-sm">
            <option>BCA</option><option>BRI</option><option>DANA</option><option>GOPAY</option><option>QRIS</option>
        </select>
        <button onclick="submitDeposit()" class="w-full bg-emerald-600 py-3 rounded-lg font-bold text-slate-950">KONFIRMASI DEPOSIT</button>
    </div>
</div>

<!-- Live Chat -->
<a href="https://wa.me/6281213847109" class="fixed bottom-6 left-6 bg-green-500 p-4 rounded-full shadow-2xl z-50">
    <i class="fa-brands fa-whatsapp text-2xl text-white"></i>
</a>
    <script>
    // FUNGSI LOGIN
    function handleAuthAction() {
        const user = document.getElementById('auth-username').value;
        const pass = document.getElementById('auth-password').value;

        if (user.trim() === "" || pass.trim() === "") {
            alert('Harap isi Username dan Password!');
            return;
        }

        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('main-app-container').style.display = 'block';
    }

    // FUNGSI PESAN DAFTAR
    function showRegisterAlert() {
        alert("Silakan hubungi Admin melalui WhatsApp untuk proses pendaftaran.");
    }

    // FUNGSI PEMBAYARAN
    function openPayment(harga, tiket) {
        document.getElementById('modal-deposit').style.display = 'none';
        document.getElementById('payment-form').style.display = 'block';
        window.paketDipilih = { harga, tiket };
    }

    function submitDeposit() {
        const nama = document.getElementById('nama-pengirim').value;
        const bank = document.getElementById('bank-asal').value;
        const pesan = `Halo Admin, saya ingin deposit ${window.paketDipilih.tiket} seharga ${window.paketDipilih.harga}. Nama: ${nama}, Bank: ${bank}`;
        window.open('https://wa.me/62812123847109?text=' + encodeURIComponent(pesan));
    }
