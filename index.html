<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParlayWins - VIP Match Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1329; color: #f8fafc; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen flex flex-col justify-between">

    <!-- 1. GERBANG AUTHENTICATION -->
    <div id="auth-container" style="display: block;">
        <div class="text-center space-y-1.5 mt-20">
            <i class="fa-solid fa-user-lock text-4xl text-emerald-500"></i>
            <h2 class="text-xl font-black tracking-wider text-slate-100 uppercase">PARLAYWINS</h2>
            <p id="auth-subtitle" class="text-slate-400 text-xs">Silakan masuk ke akun Anda</p>
        </div>

        <div class="space-y-3.5 mt-8">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Username</label>
                <input type="text" id="auth-username" placeholder="Masukkan Username" class="w-full p-3 bg-slate-800 rounded-xl text-sm border border-slate-700">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Password</label>
                <input type="password" id="auth-password" placeholder="Masukkan Password" class="w-full p-3 bg-slate-800 rounded-xl text-sm border border-slate-700">
            </div>
            <button onclick="handleAuthAction()" id="btn-auth-submit" class="w-full bg-emerald-500 p-3 rounded-xl font-bold text-slate-900">
                Masuk Ke Aplikasi
            </button>
        </div>

        <div class="text-center pt-4">
            <p id="auth-toggle-text" class="text-xs text-slate-400">
                Belum punya ID akun? <button onclick="toggleAuthMode(true)" class="text-emerald-400 font-bold">Daftar</button>
            </p>
        </div>
    </div>

    <!-- 2. INTERFACE UTAMA (DASHBOARD) -->
    <div id="main-app-container" class="space-y-4 w-full" style="display: none;">
        <div class="flex justify-between items-center mb-6">
            <span class="text-xl font-black text-emerald-400">PARLAYWINS</span>
            <button onclick="handleLogout()" class="bg-slate-800 px-4 py-2 rounded-lg text-xs"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>

        <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
            <h2 id="view-banner-title" class="text-sm font-bold">Selamat Datang di Portal Utama</h2>
            <p id="user-profile-name" class="text-[10px] text-emerald-500 font-bold uppercase"></p>
        </div>

        <div id="match-section" class="space-y-3">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase">Pertandingan Hari Ini</h3>
            <div class="bg-slate-900 p-4 rounded-xl flex justify-between items-center">
                <span id="view-match-home" class="font-bold">HOME</span>
                <span class="text-emerald-500 font-black">VS</span>
                <span id="view-match-away" class="font-bold">AWAY</span>
            </div>
        </div>

        <div class="mt-4 p-4 bg-white rounded-xl text-center">
            <p class="text-[10px] text-slate-500 font-bold mb-2">SCAN QRIS UNTUK DEPOSIT</p>
            <img id="view-qris" src="" alt="QRIS" class="w-full rounded-lg border-2 border-emerald-500">
        </div>
    </div>

    <!-- SCRIPT UTAMA -->
    <script>
        function toggleAuthMode(isRegister) {
            const sub = document.getElementById('auth-subtitle');
            const btn = document.getElementById('btn-auth-submit');
            const tog = document.getElementById('auth-toggle-text');
            if(isRegister) {
                sub.innerText = "Buat akun baru VIP Anda";
                btn.innerText = "Daftar Akun Baru";
                tog.innerHTML = 'Sudah punya ID? <button onclick="toggleAuthMode(false)" class="text-emerald-400 font-bold">Masuk</button>';
            } else {
                sub.innerText = "Silakan masuk ke akun Anda";
                btn.innerText = "Masuk Ke Aplikasi";
                tog.innerHTML = 'Belum punya ID? <button onclick="toggleAuthMode(true)" class="text-emerald-400 font-bold">Daftar</button>';
            }
        }

        function handleAuthAction() {
            const user = document.getElementById('auth-username').value.trim();
            const pass = document.getElementById('auth-password').value.trim();
            if(!user || !pass) { alert('Isi semua kolom!'); return; }
            
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-app-container').style.display = 'block';
            document.getElementById('user-profile-name').innerText = user;
            alert('Selamat datang, ' + user);
        }

        function handleLogout() { location.reload(); }

        window.onload = function() {
            if(localStorage.getItem('homeText')) document.getElementById('view-match-home').innerText = localStorage.getItem('homeText');
            if(localStorage.getItem('awayText')) document.getElementById('view-match-away').innerText = localStorage.getItem('awayText');
            if(localStorage.getItem('qrisText')) document.getElementById('view-qris').src = localStorage.getItem('qrisText');
        };
    </script>
</body>
</html>
