<!DOCTYPE HTML>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParlayWins - Perbaikan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-950 text-white font-sans">

    <!-- Screen Login -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl">
            <h2 id="auth-title" class="text-2xl font-black text-emerald-400 italic text-center mb-6">MASUK AKUN</h2>
            
            <input id="auth-username" type="text" class="w-full p-3 mb-4 bg-slate-800 rounded-xl border border-slate-700" placeholder="Username">
            <input id="auth-password" type="password" class="w-full p-3 mb-6 bg-slate-800 rounded-xl border border-slate-700" placeholder="Password">
            
            <button id="btn-login" onclick="tesTombol()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold">
                Masuk Sekarang
            </button>
        </div>
    </div>

    <script>
        function tesTombol() {
            // INI ADALAH DEBUGGER: Jika tombol ditekan, ini akan muncul.
            alert("Tombol berhasil ditekan! Sistem JavaScript sudah berjalan.");
            
            // Logika login akan dijalankan setelah ini
            console.log("Memulai proses login...");
        }
    </script>
</body>
</html>
