<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParlayWins - VIP Match Portal</title>
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1329; color: #f8fafc; font-family: sans-serif; }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen flex flex-col justify-center">

    <!-- 1. GERBANG AUTHENTICATION -->
    <div id="auth-container" class="my-auto w-full bg-slate-900 p-6 rounded-xl shadow-2xl border border-slate-700">
        <div class="text-center space-y-1.5 mb-6">
            <div class="mx-auto bg-emerald-500 w-12 h-12 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-lock text-white text-xl"></i>
            </div>
            <h2 id="auth-title" class="text-xl font-bold">Member Login</h2>
        </div>
        
        <div class="space-y-4">
            <input id="auth-username" type="text" placeholder="Username" class="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:outline-none focus:border-emerald-500">
            <input id="auth-password" type="password" placeholder="Password" class="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:outline-none focus:border-emerald-500">
            <button onclick="handleAuthAction()" class="w-full p-3 bg-emerald-600 hover:bg-emerald-500 rounded font-bold transition">LOGIN</button>
        </div>
    </div>

    <!-- 2. MAIN APP CONTAINER (Tersembunyi Awalnya) -->
    <div id="main-app-container" class="hidden">
        <h1 id="user-profile-name" class="text-2xl font-bold text-center">User</h1>
        <div id="view-banner-title" class="text-center text-lg mt-4">Dashboard</div>
        <p id="view-banner-desc" class="text-center text-slate-400">Selamat datang di portal.</p>
    </div>

    <script>
        function handleAuthAction() {
            const user = document.getElementById('auth-username').value.trim().toLowerCase();
            const pass = document.getElementById('auth-password').value.trim();

            if (!user || !pass) {
                alert('Mohon isi semua kolom!');
                return;
            }

            // LOGIKA LOGIN ADMIN
            if (user === "admin" && pass === "admin123") {
                alert('Selamat Datang Admin!');
                document.getElementById('user-profile-name').innerText = "ADMINISTRATOR";
                document.getElementById('view-banner-title').innerText = "DASHBOARD ADMIN";
                document.getElementById('view-banner-desc').innerText = "Anda memiliki akses penuh ke pengaturan sistem.";
            } else {
                // LOGIN USER BIASA
                document.getElementById('user-profile-name').innerText = user;
            }
            
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-app-container').style.display = 'block';
        }
    </script>
</body>
</html>
